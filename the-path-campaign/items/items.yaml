# The Path - Items
# Sorted by type: General first, then Village market goods, then faction items grouped by faction name

# ============================================================
# GENERAL ITEMS
# ============================================================

- name: Mist Protection Charm
  type: General
  usage: Consumable
  tier: 1
  tradeValue: 0.5
  flavor: "A small wooden bead carved with a simple ward-mark, strung on rough cord. Travelers going into the mist tie a handful to their wrists and come back with fewer than they left with."
  effect:
    category: Protection
    description: |
      When you would gain a Mist token, you may destroy this charm to negate that token.

- name: Cliffgold
  type: General
  usage: Consumable
  tier: 2
  tradeValue: 1.5
  flavor: "A bright yellow flower that clings to cliff faces where nothing else grows — ancient, stubborn, and worth the reach."
  effect:
    category: Restoration
    description: |
      Consume during a rest. Remove 3 Mist tokens.

- name: Deadnerve
  type: General
  usage: Consumable
  tier: 1
  tradeValue: 1
  flavor: "A bitter black paste that numbs the tongue and quiets the mind."
  effect:
    category: Restoration
    description: |
      Can only be consumed during an encounter. Clear 2 Stress.

- name: Firepatch
  type: General
  usage: Consumable
  tier: 1
  tradeValue: 1
  flavor: "A rough bandage soaked in alchemical fire that sears wounds shut on contact."
  effect:
    category: Restoration
    description: |
      Can only be used during an encounter. Press it against an open wound to heal 2 HP. Mark 2 Stress - the burning is excruciating.

- name: Rushpowder
  type: General
  usage: Consumable
  tier: 1
  tradeValue: 1.5
  flavor: "A pinch of sharp white powder that makes the air taste like lightning."
  effect:
    category: Enhancement
    description: |
      Can only be inhaled during an encounter. Gain advantage on all Agility rolls for the rest of the scene.

- name: Iron Nerve Paste
  type: General
  usage: Consumable
  tier: 2
  tradeValue: 1.5
  flavor: "A grey-black paste that smells faintly of copper and old stone. Applied to the temple, it doesn't numb the pain — it convinces you the pain was never worth feeling."
  effect:
    category: Restoration
    description: |
      When you would mark Stress from any source, you may apply a dose as a reaction to negate that Stress instead. The paste has 3 uses per Long Rest.

      Each time you use a dose, the next time you would recover Stress (from any source), you recover 1 less Stress for each dose used since your last Long Rest. If this reduces your recovery to 0 or less, you recover no Stress from that source.

- name: Silkweaver
  type: General
  usage: Reusable
  tier: 2
  tradeValue: not tradeable — a living gift from the Spider Queen, not merchandise
  flavor: "She fits in a palm, weighs almost nothing, and the silk she produces is flawless — the Queen does not give gifts lightly."
  effect:
    category: Utility
    description: |
      Once per long Rest, the Silkweaver can spin one silk item. Describe what you
      weave; the GM assigns a minor utility effect appropriate to its form
      (a length of rope, a wrapped bundle, a woven strip, a simple garment).

      Each Short Rest, in plain sight, the spider spins a small open-weave
      net and releases it to the wind. It drifts away on the breeze — visible
      to anyone watching, gone within moments. The net carries encoded
      information: scent-traces, the shape of where you have been, the faces
      of those nearby. The Queen's drones intercept these nets. She
      accumulates knowledge of your movements and will act on what she
      learns when the time is right.

