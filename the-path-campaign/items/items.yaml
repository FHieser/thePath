# ============================================================
# BLOOD ITEMS
# ============================================================

- name: Archon's Reserves
  type: Blood
  usage: Reusable
  tier: 1
  tradeValue: 1
  flavor: "A dark glass vial etched with ancient channel-marks, always faintly warm to the touch."
  effect:
    category: Utility
    description: |
      Spend 1 HP at any time to fill the vial with your blood. The vial holds 1 HP of blood. Pour the filled vial at a location that requires a blood sacrifice to count as 1 HP of sacrifice. Multiple vials can be used together to meet higher sacrifice costs.

- name: Rapid Mutator
  type: Blood
  usage: Consumable
  tier: 2
  tradeValue: 1.5
  flavor: "A crude syringe of dark red compound that smells of iron and copper wire — the Archon's handwriting is on the label, neat as a death sentence."
  effect:
    category: Restoration
    description: |
      Inject during an encounter. Regain 5 HP. Gain 2 Stress. Mark your first unmarked Hit Point — this slot cannot be healed until you spend a Long Rest action to regenerate it.

- name: Red Eye
  type: Blood
  usage: Reusable
  tier: 2
  tradeValue: 2.5
  flavor: "A plague crystal fused with mist essence and blood — look into it and the dark coils move, and something inside looks back."
  effect:
    category: Restoration
    description: |
      Hold the Red Eye and focus. Regain 1 HP and clear 1 Stress. Gain Mist tokens equal to the number of times you have used the Red Eye since your last Long Rest.

      First use: +1 Mist token. Second use: +2 Mist tokens. Third use: +3 Mist tokens.

      The usage counter resets on a Long Rest.

- name: Sanguine Cage
  type: Blood
  usage: Reusable
  tier: 2
  tradeValue: 3
  flavor: "Interlocked bones sealed with hardened blood — crafted through hemomancy, worn by those who know the body is a resource to be spent wisely."
  effect:
    category: Protection
    description: |
      Tier 2 armor. Thresholds: 9 / 20.

      Blood Chamber: At any time, spend HP to fill the chamber (up to 3 HP maximum). At any time, draw 1 HP from the chamber to restore it to yourself. HP stored in the chamber persists until spent.

# ============================================================
# ROOTBOUND ITEMS
# ============================================================

- name: Dreaming Bark
  type: Rootbound
  usage: Consumable
  tier: 1
  tradeValue: 1
  flavor: "A strip of pale bark that tastes of soil and sleep. Chew it and the world behind your eyes opens."
  effect:
    category: Utility
    description: |
      Consume the bark to enter a brief trance. The GM reveals all face-down location cards adjacent to your current location on the Path grid. Mark 1 Stress for each card revealed - the visions come at a cost.

- name: Lullroot
  type: Rootbound
  usage: Consumable
  tier: 1
  tradeValue: 1
  flavor: "A soft, fibrous root that smells of rain-soaked earth and quiet evenings."
  effect:
    category: Restoration
    description: |
      Can only be consumed during a rest. Clear 1 Stress and heal 1 HP.

- name: Dewcleanse
  type: Rootbound
  usage: Consumable
  tier: 1
  tradeValue: 1.5
  flavor: "A pouch of dried herbs that blooms into fragrant tea when steeped in warm water. Quite some powerful stuff, but takes a while to get going. Tastes good too."
  effect:
    category: Restoration
    description: |
      Brew during a rest. Every player who is resting may drink and remove 2 Mist tokens. Preparing the tea takes time - it cannot be rushed or brewed during an encounter.

- name: Circle Ash
  type: Rootbound
  usage: Consumable
  tier: 1
  tradeValue: 0.5
  flavor: "Fine grey ash that drifts against the wind when released near fey-touched ground."
  effect:
    category: Utility
    description: |
      Throw the ash into a Mushroom Circle. The particles swirl and drift toward the direction of linked Mushroom Circle locations, showing you which way to face before stepping in.

# ============================================================
# FIRE BORN ITEMS
# ============================================================

- name: Flame Bearer's Amulet
  type: Fire Born
  usage: Reusable
  tier: 1
  tradeValue: 1.5
  flavor: "A flat disc of alien metal, warm to the touch even in the deepest mist, inscribed with symbols no mortal language reads."
  effect:
    category: Protection
    description: |
      Once per Long Rest: when you would gain a Mist token, negate 1 token. The amulet grows cold after use and must be warmed again through rest near flame.

- name: Flame Blade
  type: Fire Born
  usage: Reusable
  tier: 2
  tradeValue: 4
  flavor: "An ancient blade of alien metal that runs hot in the hand — the flame inside it does not care whose blood it burns."
  effect:
    category: Disruption
    description: |
      Two-handed. Attacks use Strength or Agility (wielder's choice).

      When drawn, lose 3 HP and remove 2 Mist tokens from yourself. The blade's fire burns the mist corruption out of the wielder as it ignites.

      While drawn: d10+7 damage — Powerful (on a successful attack, roll an additional d10 and discard the lowest result) — Burning (when you roll max damage on a damage die, the target must mark a Stress).

      The blade goes dormant when sheathed and must be drawn again to use.

- name: Ember Weave
  type: Fire Born
  usage: Reusable
  tier: 2
  tradeValue: 2
  flavor: "A shred of the old pilgrimage, warm where everything else is cold. Hold it up and something remembers what it meant to believe in fire."
  effect:
    category: Enhancement
    description: |
      Hold the Ember Weave aloft and spend 1 Flame Essence. The flame-thread ignites briefly, casting gold light across everyone nearby. Each player present gains 1 Hope and removes 1 Mist token. The weave dims after use until fed flame again.

- name: Flashburn
  type: Fire Born
  usage: Consumable
  tier: 2
  tradeValue: 1.5
  flavor: "A compact torch that flares with blinding sacred light, pushing the shadows back - but they always return deeper."
  effect:
    category: Restoration
    description: |
      Light the Flashburn. Distribute 3 Hope among the players. The GM gains 2 Fear - the mist recoils from the flame but the shadows grow larger in answer.

