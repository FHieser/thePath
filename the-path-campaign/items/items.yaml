- name: Br4ss Filt3r
  type: Brass Mechanicorum
  usage: Reusable
  tier: 2
  tradeValue: 2
  flavor: "A small cylindrical device of polished brass and crystal mesh that hums faintly, drawing moisture from the air."
  effect:
    category: Protection
    description: |
      While carried, the Br4ss Filt3r absorbs Mist tokens before they reach you. It can absorb up to 3 Mist tokens total. Once full, it stops working and must be replaced or repaired by the Brass Mechanicorum.

# ============================================================
# MIST BORN ITEMS
# ============================================================

- name: The Claiming Conch
  type: Mist Born
  usage: Reusable
  tier: 3
  tradeValue: 4
  flavor: "Split when it died, but the depths still broadcast through the crack. Something below is still listening."
  effect:
    category: Utility
    description: |
      Cannot be used at Flame-Touched locations — the sacred fire drowns out the depths.

      Press the shell to your ear. Gain 1 Mist token — you do not suffer its immediate consequence. The number of uses per long rest and the strength of the effect depend on your current Mist token total:

      - 0 tokens: Gain 1 Mist token (no immediate consequence). The conch does not answer. The void does not yet know you.
      - 1–3 tokens (1 use per long rest): Gain 1 Mist token (no immediate consequence). Ask the conch a question. It answers.
      - 4–6 tokens (2 uses per long rest): Gain 1 Mist token (no immediate consequence). Ask the conch a question. It answers. The GM loses 1 Fear.
      - 7–9 tokens (3 uses per long rest): Gain 1 Mist token (no immediate consequence). Ask the conch a question. It answers. The GM loses 2 Fear.

      Crossing into a higher tier mid-session immediately grants access to the additional use(s) for that tier.

      The conch speaks in fragments and doctrine. The GM answers in the voice of the void:

      "What is the mist?" — "We are nothing."
      "Why do you attack us?" — "Because of the flame. Do not wake him up."
      "What are your goals?" — "We extinguish the flame. Keep him in the nothing."
      "What is the flame?" — "Rouses of him trying to wake."
      "Is there a way to end this?" — "Yes. Extinguish every flame. Let him sleep undisturbed."

- name: Tidepole Marker
  type: Mist Born
  usage: Reusable
  tier: 2
  tradeValue: 3
  flavor: "Something in the deep end of the mist recognizes this shape. It doesn't know the signal is wrong."
  effect:
    category: Disruption
    description: |
      Requires Strength +1 or higher to carry — the pole is dense iron, heavy with age and residual void energy.

      Can only be used in Mist-Touched locations.

      Drive the pole into the ground and channel mist through its broken scan network. Gain Mist tokens without suffering their immediate consequence — in exchange, the GM removes 1 Fear. The amount you feed depends on how deep you already are:

      - 0–2 Mist tokens: Gain 3 Mist tokens
      - 3–5 Mist tokens: Gain 2 Mist tokens
      - 6–9 Mist tokens: Gain 1 Mist token

      The pole hums while grounded, broadcasting to a network that no longer receives.

# ============================================================
# THE CROAK ITEMS
# ============================================================

- name: Reed Candle
  type: The Croak
  usage: Consumable
  tier: 1
  tradeValue: 1
  flavor: "A thick candle pressed from reed wax and dried marsh grass. It burns slow and smells like still water after rain."
  effect:
    category: Restoration
    description: |
      Light during a rest. All players taking that rest clear 1 Stress.
      The candle burns for the duration of the rest and cannot be extinguished and relit.

- name: Bubble Croaker
  type: The Croak
  usage: Consumable
  tier: 1
  tradeValue: 1
  flavor: "A thumb-sized frog that sits perfectly still until it doesn't. Then it fills its throat sac until the bubble is taller than a person and keeps going."
  effect:
    category: Utility
    description: |
      Release the frog. It inflates a bubble large enough to hold up to 3 creatures, then
      the bubble lifts free and the frog is gone.

      The bubble floats steadily upward by default. Passengers can push off nearby surfaces
      or use tools to steer, but the bubble's natural direction is up.

      The bubble persists until it contacts a sharp surface, takes damage from a weapon or
      attack, or the scene ends. Creatures inside cannot take actions that would puncture
      the bubble without destroying it.

- name: Blood Frog Totem
  type: The Croak
  usage: Consumable
  tier: 2
  tradeValue: 2
  flavor: "A squat clay frog packed with something that isn't clay. It squats where you leave it and watches the mist come in."
  effect:
    category: Protection
    description: |
      Place the totem at any location within reach. It stays there.

      While within Close range of the totem, whenever you would gain 1 Mist token, any
      player in Close range may instead take 1 damage. The totem marks 1 charge.

      After 5 charges the totem croaks once — loud, final — and splatters. It is destroyed.

- name: Stress Leeches
  type: The Croak
  usage: Consumable
  tier: 1
  tradeValue: 1
  flavor: "A damp pouch of swamp leeches, kept alive. The Croak sells them with the same expression they sell everything else."
  effect:
    category: Restoration
    description: |
      Apply during a rest. Before applying, choose how many leeches to use (1 to 3).
      Clear that many Stress. Lose 1 HP for each Stress cleared.

      The exchange is fixed — you choose the amount before the leeches are applied.
