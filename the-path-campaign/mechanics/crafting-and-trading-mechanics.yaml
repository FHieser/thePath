title: Crafting & Trading Mechanics
version: 2

introduction: |
  Trade Points (TP) are a lightweight currency for handling exchanges at Inhabited locations,
  Trading Grounds, and faction outposts. They exist to replace vague "sure, that seems fair"
  haggling with a shared reference point — but every value in this system is a default, not
  a law. A tradeValue on any item can be hand-overridden at any time without breaking the
  rest of the table. Start by pricing items as they come up in play; you don't need to value
  everything at once.

corePrinciple: |
  A single tradeValue field on each item serves as both its buy cost and its sell value,
  keeping the system simple to run at the table. If a specific trade feels wrong in the
  fiction (a desperate NPC overpaying, a hostile trader gouging newcomers), adjust that one
  exchange — don't rewrite the table over it.

pointSources:
  description: How items and materials translate into Trade Points.

  finishedItems:
    description: |
      Complete, ready-to-use items (the kind catalogued in items.yaml) are valued by Tier.
      This is the primary axis for Reusable gear and anything substantial enough to carry
      a Tier rating — Tier tracks the campaign's existing scale (1 = level 1, 2 = levels
      2-4, 3 = levels 5-7, 4 = levels 8-10).
    table:
      - tier: 1
        points: 1
      - tier: 2
        points: 2
      - tier: 3
        points: 3
      - tier: 4
        points: 4

  rawMaterials:
    description: |
      Found materials and crafting components (ore, herbs, monster parts, mist-touched
      curiosities) don't carry a Tier — they're valued by how ready they are to use as-is.
      This rewards players for bringing in things a trader can put to immediate use over
      things that need work first.
    table:
      - readiness: Needs heavy refinement
        points: 0.25
        example: A raw crystal shard, an unprocessed pelt, a vein of ore
      - readiness: Needs light processing
        points: 0.5
        example: Cleaned herbs, a partially-worked hide, a stabilized reagent
      - readiness: Immediately usable
        points: 1
        example: A finished dose, a ready-to-mount trophy, a stable reagent

  consumables:
    description: |
      Consumables are priced independently of Tier — a one-shot effect shouldn't cost as
      much as a permanent Tier-matched item, even if it's found at a high-Tier location.
      Price within this band based on how much the effect swings a scene.
    range: 0.5 - 2 points
    guidance:
      - cost: 0.5
        description: Minor, situational, or narrow-condition effects (small single resource, niche utility)
      - cost: 1
        description: Standard single-resource recovery or a solid one-scene buff
      - cost: 1.5
        description: Strong scene-defining effects, multi-resource recovery, or party-wide reach
      - cost: 2
        description: Powerful, rare, or heavily party-wide effects
    exceedingTheBand: |
      Legendary-tier one-shots that dramatically swing a whole session (near full-party
      resets, guaranteed criticals, session-ending nukes) can exceed 2 points at GM
      discretion — the band is a default, not a ceiling. See the Village items in the
      catalogue for the baseline this band was calibrated against.

  reusables:
    description: |
      Reusable items cost more than a Consumable of comparable power, since they pay off
      repeatedly instead of once. There is no fixed multiplier — price these case by case 
      against the finished-item Tier table above, then adjust for how often the effect can be used (once per Long Rest vs. always-on) and whether it carries built-in costs or
      limitations that already balance it.
    guidance: |
      Gut check: if you'd be happy seeing this item at the table every session for the
      rest of the campaign, it's priced high enough.

factionGating:
  description: |
    Faction items carry a tradeValue like anything else, but Trade Points alone don't unlock them — the player also needs standing or access with that faction. This keeps faction gear tied to relationships and questlines rather than becoming a shopping list anyone can walk up to.

specialCases:
  description: |
    Some items resist a clean tradeValue because they're narrative gifts, living
    companions, or otherwise not meant to be sold at a stall. Mark these explicitly rather
    than forcing a number — e.g. Silkweaver (a gift from the Spider Queen, not merchandise).

crafting:
  description: |
    A downtime move that lets a player convert Raw Materials into a finished item (or combination of items) themselves, instead of trading them to an NPC. Combine the point value of any Raw Materials being spent, apply the rest multiplier below, then spend the result immediately on item(s) whose fictional materials plausibly match what was spent (nature ingredients craft Rootbound-flavored effects, blood reagents craft Blood-flavored effects, etc. — GM's call).
  restMultipliers:
    - rest: Short Rest
      multiplier: 1.25
      note: Enough time for quick field-crafting, at a modest efficiency gain over just trading materials in.
    - rest: Long Rest
      multiplier: 2
      note: Enough time and care to refine raw materials well beyond their trade-in worth.
  roundingRule: |
    Multiply the combined material value by the rest multiplier, then round the result down to the nearest 0.25. This keeps every crafting budget aligned to the same 0.25 granularity Raw Materials are already priced in.
  maxCraftValue: 2
  maxCraftValueNote: |
    Regardless of multiplier, a single crafting action can never produce item(s) totaling more than 2 points by default — the same ceiling as the Consumables band. This keeps crafting a way to turn scavenged scraps into a handy potion, not a shortcut to Tier-3+ gear. This cap is itself a default: a Village Project (e.g. an upgraded forge, in the spirit of the existing Advanced Forge Expansion project) can raise it as the party's Tier increases.
  leftoverMaterials: |
    If a crafting budget doesn't divide evenly into the item(s) chosen, the remainder isn't lost — it carries forward as a Raw Material of that leftover value, usable in a future crafting action. Two safeguards keep this from being exploitable: a crafting action can never be performed using leftover alone, it always needs at least one newly-gathered Raw Material added alongside it, and a crafting action must always produce at least one complete item — you can't spend a rest just banking value forward without crafting anything. Together, these mean leftover can only ever supplement real, newly-found materials; it can't compound on its own.
  factionGatingInteraction: |
    Crafting doesn't automatically bypass Faction Gating — raw materials and a rest don't teach you a faction's secrets by themselves. At the GM's discretion, this can be waived once a player has established a narrative reason to know how: they've learned the recipe, or have used/encountered that faction's item type often enough to reverse-engineer it.
  example: |
    A player carrying nature ingredients worth 0.75 points combined can, on a Long Rest, craft an item or combination of items worth up to 1.5 points (0.75 x 2) that fits nature/Rootbound theming — comfortably under the 2-point ceiling. If they only spend 1.25 of it, the remaining 0.25 carries forward as a Raw Material for their next crafting action, provided that action also includes a newly-gathered material and produces a complete item.
