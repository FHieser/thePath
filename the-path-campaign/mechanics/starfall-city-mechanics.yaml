title: The Starfall City — Mechanics
subtitle: >
  The capital of the Starfall Kingdom is unlike any other location on The Path.
  The rules that keep players alive elsewhere will kill them here. The mist that
  corrupts everywhere else is the only thing holding the city together.

path_anchor:
  intro: >
    Every other location swallowed by the mist drifts — Unstable, here one session and gone the
    next. Starfall City does not. It has wedged itself into the Path as a permanent fixture and
    will not leave, and for as long as it stays it bleeds the Path's Sacred Flames toward itself —
    and the Village feels it directly.
  the_urgency:
    description: >
      This is the players' reason to go in and their clock to get out. The city is bleeding the
      network dry, and it cannot be waited out from a distance.
    effects:
      - The city is Stable and cannot be cleared by a normal Path reset.
      - While the city is anchored, the Village consumes 2 Flame Essence per day instead of 1.
      - Sacred Flame — the party's safest tool everywhere else — wakes the dead here. Carrying flame into a district is catastrophic (see wake_system). The city strips away the players' usual safety net.
  the_cause:
    description: >
      The why the players must uncover. It is the nature of the devil's crystal that locks the city
      in place: the corrupted heavenly material is drawn to flame, because flame is what awakens it,
      and so the dead kingdom reaches out and pulls the Path's Sacred Flames toward itself. At the
      heart of it is the king. The bargain is engraved into him; he is the start and the end of the
      devil's crystal, the source from which its hunger for energy radiates. The city is stuck
      because the king still carries the devil's gift, and the gift is still hungry.
    discovery: >
      Pieced together from the Lord's Final Log and what waits behind the castle door. Learning
      the cause is the same investigation as learning how to get in — both end at the Deepest Chamber.
  resolution: >
    The king is not a hard fight — he is the anchor, not a guardian. Destroy him and the devil's
    energy that makes the crystal seek and devour flame leaves it: the crystal goes inert, the city
    stops draining the Path, and its grip releases, letting the dead kingdom drift back into the
    mist at last. What that costs — the city lost, the dead finally still, the Village spared — is
    the players' to weigh.

city_grid:
  row_labels:
    - id: inner
      label: Inner
      description: Power, judgment, knowledge. Where decisions were made that destroyed everything.
    - id: civic
      label: Civic
      description: Labor, trade, faith. Where ordinary people lived and died.
    - id: outer
      label: Outer
      description: Entry, transition, containment. Where the city met the world — and sealed itself off from it.

wake_system:
  intro: >
    Each district tracks its own Wake level (0–3) — how disturbed its crystallized dead are.
    Wake is per district. Each step up the ladder takes its own 4-point counter; when a counter
    fills, the district rises one level and a fresh counter begins. Same engine at every step —
    only the triggers change.
  levels:
    - level: 0
      state: Dormant
      description: Crystallized dead sleep. Mist holds. Safe to move through.
    - level: 1
      state: Stirring
      description: A few wake nearby. Avoidable — but conflict escalates.
    - level: 2
      state: District Active
      description: All dead in the district animate. The whole district is hostile, and an Overseer arrives.
    - level: 3
      state: The Warden
      description: A massive accumulated crystal entity has arrived.
  transitions:
    - step: "Wake 0 → 1"
      name: Accumulation
      counter: 4
      note: The quiet phase — small disturbances slowly stir the district.
      triggers:
        - trigger: Sacred Flame brought into the district
          effect: Immediately Wake 1. Subsequent disturbances escalate at double speed.
        - trigger: Harvesting crystals from a corpse
          effect: "+3"
        - trigger: Physical disturbance (moving bodies, violent interaction)
          effect: "+1 (GM discretion)"
        - trigger: GM spends 1 Fear (wall collapse, loud noise, ground tremor)
          effect: "+1"
    - step: "Wake 1 → 2"
      name: Open Conflict
      counter: 4
      note: A few dead are already up; now noise is what spreads it. Finesse can still walk it back.
      triggers:
        - trigger: Silent takedown
          effect: "-1"
        - trigger: A full round of open combat (once every combatant has acted)
          effect: "+2"
        - trigger: Killing a corpse loudly
          effect: "+1"
        - trigger: GM spends 1 Fear
          effect: "+1"
    - step: "Wake 2 → 3"
      name: The Warden's Approach
      counter: 4
      note: >
        The district is fully hostile and an Overseer has arrived (see overseer, below). The Warden
        is coming — the Overseer is the one calling it.
      triggers:
        - trigger: An Overseer uses Call the Warden
          effect: "+1, and one player becomes Vulnerable"
  overseer:
    description: >
      An elite crystallized enforcer that arrives the instant a district reaches Wake 2 — the
      Security Chief's control made permanent, the herald of the Warden he became.
    action:
      name: Call the Warden
      effect: Advances the Wake 2 → 3 counter by 1 and makes one player Vulnerable.
    when_destroyed: >
      Killing the Overseer stalls the Warden's Approach — the 2 → 3 counter stops advancing (it
      holds, it does not reset) until a new Overseer arrives, roughly 1–2 rounds later (the GM may
      bring the next one sooner by spending 1 Fear). Players can buy time by cutting them down, but
      they keep coming while the district stays at Wake 2. The Overseer is the only thing that
      advances this counter — no fighting, harvesting, or Fear spend touches it.
    stat_block: TBD — build with the adversary-builder for the city's tier.
  lowering_wake:
    - Wake 1 can be walked back toward 0 — silent takedowns reduce the 1 → 2 counter, and a Stirring district settles to Dormant once the players leave and the mist reclaims the quiet.
    - Wake 2 and above does not settle on its own — it holds for the rest of this Path configuration.
    - A Path reset returns every district to Wake 0 (and the Warden to dormancy).

warden:
  description: >
    A mass of crystallized dead, fused together into something that should not move.
    Dozens of bodies compressed into one terrible entity, still glowing, still cracking, still coming.
  rules:
    - Arrives when a district reaches Wake 3.
    - Crosses district lines in pursuit of players — it is not contained by boundaries.
    - "Lingers — if players flee and the Warden loses them, it remains in the last district it occupied, permanently raising that district's Wake floor."
    - Path reset sends the Warden back to dormancy with everything else.
    - A district the Warden has claimed never returns below Wake 2 while the Warden is present.
  origin: >
    The Security Chief — transformed when he fell from the Council Hall tower (1,1).
    The Warden first emerges at the base of that tower.
  note: >
    The Warden is not a boss to be defeated in a single encounter. It is a consequence that follows.
    Players who complete the Security Chief's thread understand what they are truly fighting.

robots:
  intro: >
    When players enter a district, roll a d10. On a 10 — a robot is present.
    Roll a d6 to determine which type.
  upgrade_note: >
    The Watermill in the Mechanic's Workshop (3,1) can be upgraded to increase this chance.
    First upgrade: robot present on 9 or 10. Second upgrade: robot present on 8, 9, or 10.
  note: >
    All robots are neutral. They do not attack. They do not engage in combat.
    They do not trigger the Wake counter. Robots avoid Wake 2+ districts when possible.
    A robot changing course mid-route is an early warning.
  types:
    - roll: 1
      name: Broken
      description: Slumped against a wall or dragging a malfunctioning limb. Still trying.
      mechanic: Can be carried to the Workshop (3,1) and repaired. Returns as a random functional type — reroll d6, reroll 1s.
    - roll: 2
      name: The Tracker
      description: Moves with quiet purpose, always facing one direction.
      mechanic: Walks toward the Warden's current district. If the Warden is in this district — stops and rotates slowly in place. Follow it to find the Warden. Watch it to avoid one.
    - roll: 3
      name: The Carrier
      description: Wide flat chassis, built to haul. Moves slowly but never stops.
      mechanic: Players can load it with items. Carries them safely back to the Workshop. Can be redirected to any district instead. Cannot carry living creatures.
    - roll: 4
      name: The Medic
      description: Gentle movements. Reaches toward the injured out of old habit.
      mechanic: "Once per encounter: remove 1 Stress OR restore 1 HP from one player. Not both."
    - roll: 5
      name: The Cleaner
      description: Moves bodies with careful, practiced hands. Has been doing this for decades.
      mechanic: Cosmetic only. Follow it — it leads to the Sanctuary Keep (2,3) and the pile of dead it has been building since the city fell.
    - roll: 6
      name: The Builder
      description: Carries tools. Assesses structures with slow mechanical attention.
      mechanic: "Players can direct it once: seal a doorway, reinforce a barricade, or collapse a passage. The change persists for this Path configuration."

castle_access:
  intro: >
    The Lord's Castle sits above the grid, sealed. The crystallized Soldier is fused across
    the door he barred with his own body — "Do not open this door again. This shall be his end."
    There is no lock to pick and no wall to climb. The only way through is to cut the Soldier's
    crystal seal away, and the only tool that can do that quietly must be built from the work
    the dead left behind.
  the_drill:
    description: >
      Players assemble a breaching drill from three components, each the unfinished last labor
      of one of the city's dead. None alone is enough. Together they cut through crystal without
      shattering it — and without waking the entire castle.
    components:
      - name: The Last Engine
        role: Power
        source: Mechanic's Workshop (3,1)
        thread: mechanic
        description: >
          The Mechanic's final build — a compact self-winding clockwork core meant to replace
          the watermill's heart, left unfinished on his bench. The only power source left in the
          kingdom that still turns.
      - name: The Cutting Head
        role: Bit
        source: The Merchant's trail (early — original shop, Craftsmen's Ward 2,1)
        thread: merchant
        description: >
          A diamond-hard harvest head from the Merchant's gang, built to cut clean crystal from
          corpses without shattering it. Shattered crystal is worthless — and wakes the dead.
          Found partway down the Merchant's trail; it does not require finishing it.
      - name: The Sleeping Tone
        role: Dampener
        source: University / Burning Fields (1,3)
        thread: university
        description: >
          A tuning device and the doctors' notes — the nurse's parents among them. They never
          cured the plague, but they found a resonant tone that lulls the crystal deeper. Fitted
          to the drill, it keeps the Wake from spiking while players cut. This is the in-fiction
          reason breaching the castle does not instantly wake everything.
  the_soldier_door:
    description: >
      Drilling through the seal still leaves the Soldier himself — a boss fight in front of the
      king's door. How that fight goes depends on whether players completed the Love Story.
    states:
      - condition: Love Story incomplete
        outcome: The Soldier animates and fights at full strength. A hard boss guarding the door.
      - condition: The Forgiveness delivered (the Nurse's note, carried to the door by the players)
        outcome: >
          His penance breaks. He stands down — or, at the GM's option, turns and fights beside
          the players against the king. The note is the key that softens, skips, or flips the fight.
  principle:
    title: Go the distance, get more
    description: >
      Building the drill is the floor — the minimum to breach the door and face the Soldier and
      king the hard way. Completing the full story threads is the ceiling: a party that finishes
      the threads walks in with a robot ally, the Village already saved, despair held at bay, the
      Soldier beside them, and the king's own armory at their backs. Same door, radically different
      finale.

chimes:
  description: >
    The plague crystal absorbs everything — flesh, air, memory. Significant moments leave impressions
    that condense over decades into crystal wind chimes, growing naturally in doorways and passages.
  rules:
    - GM triggers a chime when players should learn something — a tone drifts through the district.
    - Players find the source and touch it to play the memory.
    - Chimes are not fragile. Can be returned to and replayed.
    - Not tied to specific characters — any emotionally significant moment can leave one.
  note: The primary way players learn the stories of the city.

story_threads:
  description: >
    Six citizens, six threads running through the districts. Each thread has two tiers: a baseline
    find that helps players progress (often a drill component), and a full reward for those who
    follow the thread to its end. Chimes are the primary way the stories are told (see chimes, above).
  principle: >
    The drill is the floor; the threads are the ceiling. A party can breach the door on the three
    drill components alone. A party that finishes the threads earns the advantages that change the
    king fight and save the Village.
  threads:
    - id: mechanic
      character: The Mechanic
      end_location: Mechanic's Workshop (3,1)
      baseline:
        name: The Last Engine
        reward: Drill component (Power)
      full_reward:
        name: A robot that still listens
        reward: >
          A functioning robot won over (or commanded with the Noble's authority) becomes a companion
          for the finale — carries the drill, hauls a PC, scouts a district's Wake, or takes a blow
          meant for someone fragile. The Mechanic's machine finishes the helping he never could in person.
    - id: merchant
      character: The Merchant
      end_location: The Vault
      baseline:
        name: The Cutting Head
        reward: Drill component (Bit) — found early on the trail, does not require finishing it
      full_reward:
        name: The Vault hoard
        reward: >
          A mountain of pre-cut, sellable crystal and valuables. Useless to the dead — and exactly
          what keeps the living Village's Sacred Flame fed. The man who took everything finally gives.
    - id: university
      character: The Noble + the Doctors
      end_location: University / Burning Fields (1,3)
      baseline:
        name: The Sleeping Tone
        reward: Drill component (Dampener)
      full_reward:
        name: The Noble's Gift
        reward: >
          A Hope / anti-despair boon for the king fight — the man who gave everything away leaves
          behind the means for others to keep hope when he could not.
    - id: love_story
      character: The Nurse + The Soldier
      end_location: Sanctuary Keep (2,3, Nurse's end) / the castle door (delivery)
      baseline:
        name: —
        reward: None — this thread pays off only at completion
      full_reward:
        name: The Forgiveness
        reward: >
          The Nurse's note of forgiveness, found on her thread and carried by the players to the
          crystallized Soldier at the door. Softens, skips, or flips the Soldier fight.
    - id: security_chief
      character: The Security Chief / The Warden
      end_location: Council Hall tower (1,1)
      baseline:
        name: —
        reward: The Warden is the obstacle, not an optional thread
      full_reward:
        name: The Warden's Seal
        reward: >
          Released on the Warden's defeat. The master seal unlocks the Royal Armory inside the
          castle — the one cache the looting mob never breached — arming the party for the king.
          (Alt: opens a gallery above the Deepest Chamber, or a mechanism that turns the king's
          containment against him.)

