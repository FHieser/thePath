title: Village Siege Mechanics
version: 2
description: A framework for running siege encounters on the Village in the Mist.

siegeTrigger:
  description: |
    The siege begins when the GM's Fear reaches a threshold (recommended: 12 Fear). The Sacred Flame flares - a desperate pulse of divine energy that draws the mist's attention. The Mist Born respond with overwhelming force.

  thresholdScaling: |
    The recommended 12 Fear threshold mirrors the artificial cap on Fear in core Daggerheart, but the Path opens up far more ways to both generate and spend Fear than the base game does (see Fear Spending Options in path-mechanics.yaml). That means the 12 Fear ceiling is a starting recommendation, not a hard rule - the GM can raise the siege threshold, and the effective Fear cap along with it, when the players have earned it.

    Raise the threshold when players have meaningfully invested in the Village's defenses - completing a project that reinforces the Mist Wall Ring, establishing a second Sacred Flame anchor, or otherwise raising the Village's defensive profile through play. A Village with a genuinely stronger defensive posture can credibly hold the mist back a little longer before it forces a confrontation. In cases like this, raise the threshold and max Fear together to 13 or higher, giving the GM more Fear to hold in reserve before the siege is forced to trigger. Raise it in proportion to what the players actually built, not arbitrarily.

victoryConditions:
  - name: Total Defense
    requirements:
      - Destroy all Mist Anchors
      - Destroy all Siege Engines
      - GM Fear reaches 0 with no generation remaining
  - name: Tactical Retreat
    requirements:
      - Evacuate key NPCs and Sacred Flame essence
      - Accept village may be lost

lossConditions:
  - name: Village Falls
    trigger: Sacred Flame loses all Essence
    effects:
      - Protective barrier collapses
      - All PCs gain 3 Mist tokens
      - Village becomes Mist-Touched ruin

siegePhases:
  - name: "Phase 1: Preparation"
    trigger: Siege announced
    ends: First enemy activation
    description: Players position themselves and deploy NPCs before the first enemy activates.
    zoneLayout:
      description: The battlefield consists of three concentric rings surrounding the Village.
      zones:
        - name: Mist Wall Ring
          position: Outermost
          count: 4
          directions: North, East, South, West
          description: At the edge of the Sacred Flame's influence, deep in the mist. This is where siege engines stage and reinforcements spawn.
          mistStatus: Always Mist-Touched

        - name: Outer Ring
          position: Middle
          count: 4
          directions: North, East, South, West
          description: The first defensive perimeter.
          mistStatus: Protected by the Sacred Flame unless an anchor is present

        - name: Inner Ring
          position: Innermost
          count: 4
          directions: North, East, South, West
          description: The last line of defense before the village proper.
          mistStatus: Protected by the Sacred Flame unless an anchor is present

        - name: Village
          position: Center
          count: 1
          description: The Sacred Flame and village infrastructure. Not a positioning zone for enemies.
          onEnemyReach:
            nonLeviathan: GM gains Fear equal to that enemy's BP cost, then the enemy is removed from play.
            leviathan: Triggers Phase 3 - Inner Siege.

      connections:
        - Each Mist Wall zone connects to its corresponding Outer zone
        - Each Outer zone connects to its corresponding Inner zone
        - Each ring's zones connect to adjacent zones in that ring (North - East - South - West)
        - All Inner zones connect to Village
        - Enemies must move through zones sequentially

    startingForces:
      description: The enemy budget is calculated based on party size.
      formula: 9 x (number of PCs) + 6
      examples:
        - partySize: 2
          totalBP: 24
        - partySize: 3
          totalBP: 33
        - partySize: 4
          totalBP: 42
        - partySize: 5
          totalBP: 51
      siegeEngineCost: 12
      siegeEngineNote: The GM distributes remaining BP as enemies across Mist-Touched zones.
      placementConstraint: |
        Enemies can ONLY exist in Mist-Touched zones:
        - Mist Wall Ring: Always Mist-Touched
        - Outer Ring: Only Mist-Touched if anchor present or Mist Thrower uses "Spread the Mist"
        - Inner Ring: Only Mist-Touched if anchor present or Mist Thrower uses "Spread the Mist"

  - name: "Phase 2: Open Fields"
    trigger: First enemy activation
    ends: Siege Engine reaches Inner Ring
    description: Combat in Mist Wall and Outer rings. Siege engine advances, deploys anchors.
    turnStructure:
      description: Each round consists of two phases.
      phases:
        - name: GM Phase
          order: 1
          description: All enemies activate one at a time. Each enemy gets 1 siege action.
        - name: Player Phase
          order: 2
          description: All players act.
      combatEngagement: If enemies share a zone with NPCs or players, they MUST use their activation to fight. They cannot move past defenders.
    hopeEconomy:
      trigger: Any enemy is defeated (including Mist Anchors and Leviathan segments).
      effect: Each PC gains 1 Hope.

    fearEconomy:
      generation:
        description: Fear generated at the start of each round.
        sources:
          - name: Active Mist Anchor
            fear: 1
          - name: Active Siege Engine
            fear: 2
      spending:
        description: Spend Fear to summon reinforcements. Reinforcements spawn in Mist Wall Ring only.
        table:
          - fearSpent: 2
            bpGained: 2
          - fearSpent: 3
            bpGained: 4
          - fearSpent: 4
            bpGained: 6
          - fearSpent: 5
            bpGained: 9
          - fearSpent: 6
            bpGained: 12
          - fearSpent: 7
            bpGained: 15
          - fearSpent: 8
            bpGained: 20

  - name: "Phase 3: Inner Siege"
    trigger: Siege Engine reaches Inner Ring
    ends: Victory or defeat
    description: Desperate defense of the inner perimeter and Village.

siegeMonsters:
  description: |
    Leviathans carry a Battle Point cost of 12 - equal to the full Siege Engine cost from the Starting Forces budget (see Phase 1: Preparation) - making them the single most expensive threat the Mist Born can field. Fielding even one is already a major commitment of the siege's total BP pool; fielding it well is meant to outstrip what a typical NPC defender roster can neutralize in a single engagement.

  multipleLeviathans:
    description: |
      For sieges where the situation calls for it, the GM may deploy 2 or more Leviathans at once. This is not a baseline expectation - reserve it for sieges the players have narratively escalated, since two Leviathans alone can consume the entire BP budget of even a large party's siege and crowd out room for anything else.
    example: |
      Players who reignite the flame at Lost Flame and destroy the Mist Born holding it draw direct retaliation - "The Mist Born will not let this flame come back without a fight." If that retaliation builds into an assault on the Village itself, the GM may answer with two Pale Shell Drifter Leviathans converging from different Mist Wall zones, reflecting how badly the Mist Born want the Sacred Flame extinguished again.

  defenderCounterplay:
    description: |
      A Leviathan's 12 BP is normally far beyond what a single NPC deployment can neutralize (see NPC Defenders - Deployment). Defenders can instead combine Battle Power by deploying multiple NPCs into the Leviathan's zone during the same Player Phase.
    thresholds:
      - bp: 12
        label: Full Match
        effect: Defenders combining to 12 BP or more in the Leviathan's zone neutralize it outright, per the standard deployment resolution.
      - bp: 6
        label: Half Match
        effect: Defenders combining to at least 6 BP (half the Leviathan's cost) can't defeat it, but they stall it - the Leviathan does not trigger its siege activation on its next turn.
    note: |
      Stalling still costs the defenders their normal Hope price for the NPCs deployed - a stalled Leviathan is delayed, not weakened, and resumes its activation at full BP the turn after.

