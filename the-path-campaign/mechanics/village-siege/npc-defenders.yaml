title: NPC Defenders
description: Village NPCs that can be deployed to counter enemy threats during a siege.

deployment:
  howToDeploy:
    - Choose an NPC from the roster
    - Choose a zone within their allowed range where enemies are present
    - Pay the Hope cost collectively as a party
    - "Resolve: The NPC neutralizes enemies with total BP equal to or less than their Battle Power"
  timing: NPCs can be deployed during the Player Phase. Deployment is instant.
  resolution: |
    When deployed, the NPC clears enemies up to their Battle Power value from that zone. The GM decides which enemies are destroyed. Excess enemy BP remains.
  example: |
    Brenner (4 BP) deployed against 1 Leader (3 BP) + 1 Support (1 BP) = 4 BP total. Brenner neutralizes all enemies.

npcs:
  - name: Donatello
    battlePower: 5
    startingHopeCost: 3
    hopeIncrease: 1
    zonePlacement:
      - Mist Wall
      - Outer
      - Inner
    specialRules:
      - name: Veteran Efficiency
        description: Hope cost never exceeds 4
    description: |
      The village's most experienced fighter. Can venture into the deepest mist and still operates effectively even under desperate conditions.

  - name: Brenner
    battlePower: 4
    startingHopeCost: 1
    hopeIncrease: 2
    zonePlacement:
      - Inner
    specialRules:
      - name: Rallying Presence
        description: NPCs deployed with him get +2 BP
    description: |
      A capable defender who holds the inner line. Gets exhausted quickly when fighting on the frontlines, but inspires others around him.

  - name: The 7 Gnomes
    battlePower: 3
    startingHopeCost: 2
    hopeIncrease: 1
    zonePlacement:
      - Outer
      - Inner
    specialRules: []
    description: |
      A coordinated unit that fights as one. Straightforward and reliable.

  - name: Nix
    battlePower: 2
    startingHopeCost: 3
    hopeIncrease: 0
    zonePlacement:
      - Inner
    specialRules:
      - name: Hit them where it hurts
        description: The players can choose which enemies Nix neutralizes.
    description: |
      A diva, but efficient at what she does. Expensive to deploy but consistent.

  - name: Villager Militia A
    battlePower: 2
    startingHopeCost: 1
    hopeIncrease: 2
    zonePlacement:
      - Outer
      - Inner
    specialRules: []
    description: Armed villagers willing to defend their home.

  - name: Villager Militia B
    battlePower: 2
    startingHopeCost: 1
    hopeIncrease: 2
    zonePlacement:
      - Outer
      - Inner
    specialRules: []
    description: Armed villagers willing to defend their home.

additionalDefenders:
  description: |
    NPCs that are not part of the Village's starting roster. These must be acquired through play before they join the Defender Roster and can be deployed.
  npcs:
    - name: Broken Fire Golem
      battlePower: 6
      startingHopeCost: 0
      hopeIncrease: 0
      zonePlacement:
        - Outer
        - Inner
      specialRules:
        - name: Ancient Hatred
          description: Each time it destroys enemies, its Battle Power increases by 1 for the rest of the siege.
        - name: Flame-Fed
          description: Costs no Hope to deploy. Instead, spend 1 Flame Essence each time it is deployed.
      description: |
        A towering construct of ancient brass and inscribed stone, its chest housing a shard of captured Sacred Flame. Cracked and incomplete, salvaged from the wreckage of a Fire Born carrier, now bound to defend the Village in the Mist.
