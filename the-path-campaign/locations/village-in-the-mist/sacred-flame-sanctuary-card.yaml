name: Sacred Flame Sanctuary
tier: 1
category: Social
description: |
  The summit of the village hill, where the eternal Sacred Flame burns alongside a watchtower, providing protection and hope.
impulses: |
  Maintain the sacred flame, watch for dangers and opportunities, provide sanctuary for the weary
difficulty: 11
potentialAdversaries: Mist Creatures (if flame fails)
features:
  - name: Sacred Cleansing
    type: Passive
    description: |
      When PCs rest in the village, they automatically cleanse 1d4 + Tier Mist tokens without spending a downtime move. The village flame's exceptional power and the community's accumulated cleansing knowledge make this the safest sanctuary. PCs still choose their normal two downtime moves.
    questions: |
      What rituals cleanse the mist's corruption from your body and spirit? How does the village community support your recovery?
  - name: Flame Crisis
    type: Reaction
    description: |
      When Flame Essence runs critically low, the GM gains 2 Fear as panic spreads through the village and the Sacred Flame's protective power weakens.
    questions: |
      How does the village react to the dimming flame? What desperate measures do people consider?
  - name: Creatures in the Mist
    type: Action
    description: |
      Spend 10 Fear to have Mist creatures breach the village's protective barrier and attack directly. Gain 6 Fear immediately afterwards.
    questions: |
      What types of creatures emerge from the Mist? How do villagers react when their sanctuary is violated?
  - name: Sanctuary Breach
    type: Reaction
    description: |
      When the Sacred Flame is extinguished, start a Breach Counter at 1. Each dawn while the flame remains out, all PCs gain Mist Marks equal to the current counter value, then increase the counter by 1. The counter is set to 0 when the flame is relit.
    questions: |
      How does the creeping mist corruption manifest in the village? What signs show the protection failing?
featureQuestions:
  - What prayers or ceremonies do people perform at the Sacred Flame?
  - How does the flame's light affect the behavior of Mist creatures?
  - What would happen if someone tried to take flame directly from the brazier?
  - How do different people experience the flame's presence differently?
