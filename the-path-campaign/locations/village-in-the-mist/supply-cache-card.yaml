name: Supply Cache
tier: 1
category: Social
description: |
  Storage areas on the lower terrace where the village keeps essential supplies, equipment, and provisions for survival.
impulses: |
  Ration carefully, prioritize survival needs, maintain equipment for emergencies
difficulty: 11
potentialAdversaries: None (safe sanctuary)
features:
  - name: Village Projects
    type: Passive
    description: |
      The community maintains ongoing improvement projects tracked with Progress Counters. Each project has a target number (4 for small, 6 for medium, 8 for major projects). At the start of each day, add 1 to the project's counter unless recent setbacks have disrupted work. Completed projects provide village-wide benefits.
    questions: |
      Who is leading this project? How will it look when completed? How are the players contributing to the effort?
  - name: Path Security Projects
    type: Passive
    description: |
      PCs can invest time and resources toward Path infrastructure improvements using materials and tools from the village supplies. These projects reduce specific Path location difficulties or remove dangerous features when completed. PCs can only carry one security upgrade set per Path journey due to equipment limitations.
    questions: |
      Who provides the specialized tools needed for this work? What materials does this Path section need? How do the PCs plan to make it safer?
  - name: Resource Shortage
    type: Action
    description: |
      Spend 2 Fear to reveal that critical materials for current projects are controlled by dangerous Path guardians or located in hazardous areas, requiring expedition to acquire them.
    questions: |
      Who or what guards these essential supplies? What makes retrieving them particularly dangerous?
  - name: Competing Priorities
    type: Reaction
    description: |
      When village crisis occurs (flame shortage, injuries, threats), all project progress stops until the emergency is resolved, as the community redirects all effort to immediate survival.
    questions: |
      How does the crisis pull workers away from long-term planning? What gets abandoned first?
featureQuestions:
  - How does the community celebrate when major projects are completed?
  - What materials are the hardest for the village to acquire or produce?
  - Which villager has the most expertise in construction and project management?
  - What past project failure still haunts the community's planning decisions?
projectExamples:
  villageProjects:
    - name: Auxiliary Flame Chambers
      days: 6
      effect: Increases village Flame Essence storage capacity from 3 to 5 units
    - name: Flame Essence Purification Workshop
      days: 10
      effect: Reduces daily Flame Essence consumption by half (flames only consumed every other day). Requires a quest to discover purification techniques before construction can begin.
    - name: Mobile Flame Stations
      days: 8
      effect: Creates portable flame braziers for temporary Path sanctuaries. Requires specialized quest to obtain flame channeling knowledge.
    - name: Great Messhall
      days: 6
      effect: When all villagers gather for communal meals, Hope gain increases by 1 for all participants
    - name: Private Quarters Workshop
      days: 4
      effect: Personal PC storage and workspace for equipment and projects
    - name: Better Building Tools
      days: 6
      effect: All future projects start with +1 progress counter
    - name: Advanced Forge Expansion
      days: 4
      effect: Can be built each time PCs increase in Tier, allowing creation of equipment matching the party's current Tier
  pathSecurityProjects:
    - name: Bridge Repair Kit
      effect: Remove "Treacherous Crossing" feature from one specific location
    - name: Trail Marker Set
      effect: Reduce difficulty of navigation rolls by 2 at one specific location
    - name: Portable Shelter Kit
      effect: Add emergency rest point that clears Mist Marks at one location
    - name: Obstacle Clearing Tools
      effect: Remove one environmental hazard or dangerous terrain feature
  customProjectGuidelines: |
    GMs and players are encouraged to design unique projects that fit campaign needs. Consider mechanically sound benefits (difficulty reductions, resource bonuses, new capabilities) or flavorful additions (fast travel stations to important locations, housing for key NPCs, specialized workshops for character backgrounds). Each project should provide lasting mechanical or narrative benefits.
