name: The Forge
tier: 1
category: Social
description: |
  A practical smithy built on the upper terrace, using heat from the Sacred Flame above for metalworking.
impulses: |
  Forge essential tools, create flame containers, maintain village equipment
difficulty: 11
potentialAdversaries: None (safe sanctuary)
features:
  - name: Sacred Heat Smithing
    type: Passive
    description: |
      The forge uses Sacred Flame heat, allowing superior metalwork. PCs can request equipment repairs or custom items by providing materials and time. The Sacred Flame's heat ensures exceptional quality and durability.
    questions: |
      What personal touch does the smith add to items they create? How does Sacred Flame heat affect the work?
  - name: Flame Canister Creation
    type: Passive
    description: |
      The smith can create special containers for transporting Flame Essence. Requires rare materials and time. The smith balances PC requests with village survival needs.
    questions: |
      What materials are needed for canisters? How long does creation take? What happens if a canister fails?
  - name: Equipment Priority
    type: Reaction
    description: |
      When village equipment fails or breaks during crisis, the forge becomes unavailable for PC requests until community needs are met.
    questions: |
      What village equipment is most critical? How do PCs help resolve the crisis?
featureQuestions:
  - How does the smith's relationship with the Sacred Flame affect their work?
  - What unique items can only be created using Sacred Flame heat?
  - How does the smith balance personal requests with village survival needs?
  - What would convince the smith to teach their techniques to others?
