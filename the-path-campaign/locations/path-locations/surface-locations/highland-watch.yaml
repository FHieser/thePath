name: Highland Watch
tier: 1
category: Traversal
description: A cluster of ancient stone formations where watchtowers and signal fires once formed a defensive line against creatures emerging from the mist.
impulses: Maintain vigilance against mist incursions, provide elevated sanctuary, preserve anti-mist defenses
difficulty: 11
modifiers:
  - name: Unstable
  - name: Cave Mouth
potentialAdversaries: Mist Walkers, Highland Predators (Mist-touched variants), Corrupted Stone Guardians
features:
  - name: Rocky Outcrop Fortification
    type: Passive
    description: The weathered stone formations create natural defensive positions with clear sightlines. PCs fighting from behind the fortified outcrops gain +1 to Evasion. Any PC can use an action to take full cover behind the massive stones, gaining +2 to Evasion against ranged attacks instead until they move or take an offensive action. The ancient builders designed these highlands to turn landscape into advantage.
    questions: What ancient battles were fought from these positions? How did defenders coordinate their efforts across the rocky terrain? What marks or carvings did previous occupants leave in the stone?
  - name: Watchtower Vantage
    type: Passive
    description: The ancient stone tower provides commanding views of the surrounding landscape. PCs who climb to the top can survey the area and gain a general description of one of the nearby environments currently connected to this location. With careful observation, they can identify modifications present in the surrounding environments (such as Mist-Touched, Resource-Rich, Inhabited, etc.). The elevated position reveals what ground-level travel cannot.
    questions: ''
  - name: Watchtower Depths
    type: Passive
    description: This location has the Cave Mouth modifier - a hidden staircase descends from the watchtower's foundation into underground passages. The ancient defenders built these tunnels as escape routes and supply lines, connecting the highland fortifications to subterranean refuges below.
    questions: How far do these defensive tunnels extend? What underground sanctuaries did the ancient watchers connect to? Do mist creatures use these passages now, or do the highland stones still ward them away?
  - name: Signal Fire Ward
    type: Action
    description: PCs can ignite the ancient highland braziers using 1 Flame Essence. The moment the sacred fires roar to life, all mist creatures within Close range immediately mark 3 hit points from the searing protective flames. Mist creatures at Very Far range or closer become Vulnerable as the blazing light reveals their incorporeal forms. The signal fires burn bright enough to be seen across the mist - the GM can spend 3 Fear to have powerful mist creatures (GM's choice) arrive at the highland position, drawn by the challenge to the mist's dominion. The flames burn until the end of the current scene.
    questions: What visions appear in the signal flames when they ignite? How do mist creatures react when they see these ancient defenses reawakened? What distant powers in the mist take notice of the blazing challenge?
  - name: Cairn Bindings
    type: Passive
    description: Each time PCs build a cairn at this highland position, mark progress on a counter (start at 0). When the counter reaches 10, the accumulated stone markers create a powerful navigational anchor and Highland Watch gains the Stable modifier. If the counter drops below 10 for any reason, the location reverts to Unstable. The cairns hold ancient power to anchor locations against the shifting mist.
    questions: What ancient power flows through these carefully stacked stones? How do the cairns communicate with each other across the mist? What happens when travelers disturb or add to the sacred stone arrangements?
featureQuestions:
  - What ancient disaster first brought the mist and its creatures to threaten this highland region?
  - How effective were these defensive positions against the supernatural mist incursions?
  - What knowledge about fighting mist creatures was preserved in the watchtower records?
  - Could these highland defenses be restored to protect against current mist threats?
