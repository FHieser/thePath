name: Trading Grounds
tier: 1
category: Social
description: The skeletal remains of a crossroads merchant station where a watchtower overlooks an old well and abandoned trading post.
impulses: Echo with past commerce, provide strategic vantage points, conceal forgotten treasures
difficulty: 11
modifiers:
  - name: Unstable
  - name: Inhabited
  - name: Cave Mouth
potentialAdversaries: Bandits, Scavenger Merchants, Territorial Beasts
features:
  - name: Merchant's Remnants
    type: Passive
    description: The abandoned trading post still contains traces of its commercial past. PCs who search carefully can make a Lore roll. On a success, find useful trade goods or equipment left behind. On a success with Hope, discover a hidden cache or valuable trade route information. On a success with Fear, attract the attention of current "owners" of this territory.
    questions: What goods were traded here? Why was this crossroads abandoned? Who might still claim territorial rights to this location?
  - name: Watch Tower Hold
    type: Social
    description: The tall stone tower's upper chamber always shelters a traveler, scout, or refugee seeking safety from the mist - there is always a social encounter here. The tower's ancient brazier can hold up to 2 Sacred Flames, creating a permanent flame sanctuary that wards off mist creatures and provides safe rest for all travelers when lit with proper Flame Essence.
    questions: Who seeks shelter in this tower? What stories do they tell of their travels? How much protection would 2 Sacred Flames provide to this crossroads?
  - name: Central Well
    type: Passive
    description: This location has the Cave Mouth modifier - the well provides access to underground tunnel systems.
    questions: How deep do these tunnels go? What underground locations can be reached from here? Who else might use these hidden passages?
  - name: Crossroads Ambush
    type: Action
    description: When PCs appear to be carrying valuable goods or seem vulnerable, spend a Fear to have bandits or desperate scavengers emerge from hiding spots around the trading grounds. They demand tolls, tribute, or attempt outright robbery, using the terrain's multiple hiding spots to their advantage.
    questions: Who controls this territory now? What do they consider fair payment for passage? How do they judge whether travelers are worth the risk of confronting?
featureQuestions:
  - What made this crossroads important enough to establish a permanent trading post?
  - How do current travelers and scavengers use these abandoned structures?
  - What valuable trade route information might still be hidden in the ruins?
  - Could this trading post be restored to serve merchants and travelers again?
