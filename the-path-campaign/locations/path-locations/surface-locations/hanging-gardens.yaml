name: Hanging Gardens
tier: 2
category: Exploration
description: An overgrown Brass Mechanicorum botanical research station rising on corroded stilts above a carpet of carnivorous plants, where experimental chambers dangle from chains and ancient automata tend their endless gardens.
impulses: Preserve forbidden botanical knowledge, test visitors against nature's hunger, reward those who understand the balance between cultivation and chaos
difficulty: 14
modifiers:
  - name: Unstable
potentialAdversaries: Corrupted Plant Creatures, Aggressive Vines, Territorial Guardian Constructs (if awakened), Carnivorous Flora
features:
  - name: Brass Platform Network
    type: Passive
    description: |
      Tiered brass platforms covered in wild vegetation rise on corroded stilts, connected by rusted gear-bridges and pneumatic lifts. All entry points to this location lead first to the central Botanium structure before branching outward. The GM can spend 1 Fear to have a lift mechanism jam or a platform tilt dangerously as the party attempts to cross. If players still wish to reach their destination, all PCs on the affected platform make a group Agility roll (difficulty 12). On a success, everyone balances along railings or climbs across safely. On a failure with Hope, the party chooses one PC who falls into the pit below. On a failure with Fear, two PCs (GM's choice) fall into the devouring garden.
    questions: Why did the Botanium build this facility on stilts? What did they fear from the plants below? How long can the ancient lifts continue functioning?
  - name: Devouring Garden Floor
    type: Reaction
    description: |
      The ground beneath the Botanium is carpeted with carnivorous plants—snapping jaws, grasping tendrils, and digestive pods that hungrily await any creature that falls from above. When a PC falls into the undergrowth, they take their fall damage and must immediately make a Strength roll (difficulty 12) to fight through the plants toward the emergency ladders mounted on the stilts. On a success with Hope, they escape to a ladder taking no additional damage. On a success with Fear, they take 5 damage while struggling free. On a failure with Hope, they take 10 damage before reaching a ladder. On a failure with Fear, they take 15 damage as the plants drag them deeper before they break free and climb to safety.
    questions: What species comprise this deadly carpet? Were they planted intentionally or did they escape containment? Do they fight each other for fallen prey?
  - name: Experimental Chambers
    type: Passive
    description: |
      Brass and glass containment pods dangle from thick chains, each sealed with corroded valves and filled with preserved botanical specimens. PCs can make an Agility roll to climb up and open a chamber. On a success, roll 1d6: (1-2) Aggressive thornvine lashes out for 5 damage, (3) Jumping Root (leap to Far range once without rolling), (4) Snap Powder (mark Stress to clear a Hit Point), (5) Gill Salve (breathe underwater for minutes equal to level), (6) Luminous seedpod that when planted at any Path location creates a glowing beacon, granting advantage on Path generation rolls to find that location again in future sessions.
    questions: What experiments did the Botanium conduct? Why were these specimens sealed away? What happened to the researchers?
  - name: Garden Tenders
    type: Passive
    description: |
      Small brass automata the size of house cats skitter across platforms near the central Botanium, tending plants with watering nozzles and pruning shears. These simple constructs completely ignore the PCs, focused on their horticultural tasks. If PCs observe their routines, they can make a Knowledge roll to predict safe paths through the garden—on a success, gain advantage on the next Agility roll related to platform navigation.
    questions: What instructions drive their endless routines? How long have they tended these gardens alone? Do they recognize the difference between experimental subjects and wild growth?
  - name: Master Garden Gateway
    type: Passive
    description: |
      A sealed brass vault door in the central Botanium structure remains locked by ancient mechanisms. The door only opens when this location is surrounded by 3 or more forest or nature-type locations on the Path grid. When open, it reveals a functioning alchemical laboratory with brass distillation apparatus and cultivation chambers. PCs can use this laboratory as a downtime move to synthesize any consumable from the standard list (rolls 1-24) using ingredients they've gathered. PCs who study the door mechanism can make a Knowledge or Finesse roll (difficulty 13) to disable the location-based lock permanently—on a success, the door remains accessible on all future visits regardless of surrounding locations.
    questions: What breakthrough formulas did the Botanium develop here? Why was this equipment sealed away? What experiments were too dangerous to continue?
featureQuestions:
  - What was the Brass Mechanicorum's ultimate goal with these botanical experiments?
  - How did the carnivorous plants below escape their containment and spread so aggressively?
  - What secrets are locked in the Master Garden that warranted such elaborate security?
  - Could the garden tenders be reprogrammed to serve new purposes, or are their protocols immutable?
