name: Overgrown Temple
tier: 1
category: Exploration
description: A crumbling shrine consumed by thorns and creeping vines, with its sacred cemetery and ritual gardens reclaimed by wild nature.
impulses: Guard ancient sacred knowledge, test worthiness through trials of nature, preserve forgotten rituals
difficulty: 11
modifiers:
  - name: Unstable
potentialAdversaries: Plant Creatures (Thorn Vine, Strangling Root), Temple Guardians, Ancient Spirits
features:
  - name: Sacred Thorns
    type: Action
    description: The temple's protective vines react to intruders with supernatural awareness. Spend a Fear to have thorny growth surge around the temple entrance or altar. All creatures in the affected area must succeed on an Agility Reaction Roll or become Restrained by sacred thorns and take 1d6+1 physical damage that counts as consecrated. @todo make this a fight feature if the players disturb the place
    questions: What deity or power do these thorns serve? How do they distinguish between worthy supplicants and grave robbers? What happens to those who approach with pure intentions?
  - name: Temple Archive
    type: Passive
    description: Within the vine-covered shrine, ancient texts and ritual implements remain protected by the overgrowth. PCs who approach respectfully can make a Presence roll. On a success, gain access to sacred knowledge (advantage on next Lore roll about religion or history). On a success with Fear, trigger the temple's guardians. @todo adapt this to contain either knowledge or treasure. If the players steal these the guardians awake
    questions: What sacred knowledge was preserved here? Which rituals were performed in this temple? How do the vines decide who may access the archives?
  - name: Cemetery Spirits
    type: Reaction
    description: When PCs disturb the overgrown graves surrounding the temple, restless spirits manifest to protect their eternal rest. Ghostly figures emerge from the wild vegetation, demanding proper funeral rites or offerings. PCs must succeed on a Presence roll or mark 2 Stress from supernatural dread. @todo If players are disrespectful then the dead rise, if they behave a ghost will answer a few of their questions
    questions: Who was buried in these sacred grounds? What connection did they have to the temple? What offerings would appease the restless dead?
  - name: Ritual Garden's Gift
    type: Passive
    description: |
      The temple's ceremonial gardens have grown wild but still bear sacred herbs and plants. PCs who tend to the garden with proper reverence can make an Instinct roll. On a success, roll 1d6 to harvest one consumable: Minor Health Potion (1-2), Minor Stamina Potion (3-4), or Grindletooth Venom (5-6). On a success with Hope, choose which of the three consumables you harvest.
    questions: Which plants were cultivated for sacred purposes? How does the wild growth decide what each visitor needs? What rituals require these specific herbs?
featureQuestions:
  - What ancient faith built this temple before it was abandoned to nature's embrace?
  - How do the protective thorns and spirits judge the worthiness of visitors?
  - What sacred rituals could still be performed here with the proper knowledge and respect?
  - What connection exists between the temple, its cemetery, and the ritual gardens?
