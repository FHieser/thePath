name: Lost Flame
tier: 1
category: Exploration
description: |
  A cold mountain temple rising in terraces, each level carved with alien writing and strange forms — Fire Born inscription and Mist Born response layered over each other in stone. A battle took place here and the evidence is everywhere: shattered art, broken columns, wounds in the walls where something burned through. Stairs climb upward through the terraces toward a domed upper chamber whose walls lean inward to meet — but the top is open to the sky, and the mist sits in it like water in a bowl.
impulses: Force visitors to witness what the mist destroys, Draw the curious upward through terraces that grow colder and stranger, Offer the summit to those willing to see what burns there
difficulty: 14
modifiers:
  - name: Unstable
  - name: Mist-Touched
  - name: Nothing
    value: 1
  - name: Cave Mouth
potentialAdversaries: Mist Born, Mist Walkers, Mist Stalkers
features:
  - name: The Mountain Path
    type: Passive
    description: |
      The ascent to the temple is choked with corrupting mist that clings to the cliffside, seeping into those who struggle. PCs must succeed on an Agility roll to navigate the path. On a failure, mark 1 Stress and gain 1 Mist token. On a failure with Fear, mark 2 Stress and gain 2 Mist tokens.
    questions: What keeps the mist so thick on this specific approach? Are there signs that the Fire Born once cleared this path — and that the Mist Born deliberately let it close back in?

  - name: The Extinguished Flame
    type: Counter
    description: |
      The Fire Born brazier sits cold and cracked at the temple's summit — the wound this place is named for. Players can donate Flame Essences to reignite it. Track donations on a counter (0→7). Each donation drives the Mist Born into reaction based on current progress:
        - 1–3 donated: GM gains 1 Fear
        - 4–5 donated: GM gains 2 Fear
        - 6 donated: GM gains 4 Fear
        - 7 donated: The Mist Born are destroyed. Location gains Stable + Flame-Touched. PCs may extract up to 3 Flame Essences per future visit (GM gains 2 Fear per extraction).
      The Mist Born will not let this flame come back without a fight.
    questions: Does the brazier still hold the shape of the Fire Born carrier that died here? What does it feel like to stand next to cold stone that once held back the entire mist?

  - name: The Carrier's Grave
    type: Passive
    description: |
      The Fire Born carrier collapsed against the upper terrace wall during the battle — a massive alien construct of ancient metal and inscribed brass, too large to move, too alien to fully understand. Fire Born paladins lie at their final positions around it, armoured in materials no mortal forge produced. The carrier's own brazier is shattered beyond repair, destroyed by the Mist Born forces that came through here. Only the temple flame could have been saved — and it wasn't.

      Players who approach and examine the dead can claim the Flame Bearer's Amulet freely — it lies on the nearest paladin, cold but intact.

      The Flame Blade is still sheathed at a paladin's side. Any PC who touches the hilt finds the blade beginning to draw itself — the flame inside recognises a living hand. The sequence cannot be stopped once started:
        - First pull: Lose 1 HP. The blade is halfway drawn — hold on or release?
        - Second pull: Lose 1 HP, remove 1 Mist token. The flame is burning through you — hold on or release?
        - Third pull: Lose 1 HP, remove 1 Mist token. The blade is yours.
      A PC who releases at any stage drops the blade. Another PC may attempt to claim it from the start.
    questions: What do the inscriptions on the carrier say — and is there anyone left who could read them? What did the Fire Born think was worth dying for in this specific temple?

  - name: Prayer Flags
    type: Action
    description: |
      Mist Born prayer flags flutter throughout the terraces, each inscribed with void script — meditations on emptiness and the depths below. Their presence grants the location the Nothing(1) modifier. Players can burn or tear down 3 flags to remove the modifier. Doing so draws Mist Born reaction — the GM gains 1 Fear per flag destroyed. At the start of the next visit, the mist has restored the flags and Nothing(1) returns.
    questions: Who planted these flags after the battle — soldiers who lingered, or disciples who came later to consecrate the Mist Born victory? What do the prayers ask for?

  - name: The Conch Shell of Claiming
    type: Passive
    description: |
      A massive sea conch sits at the temple altar — a Mist Born victory marker, holy to those who serve the depths. Its presence broadcasts a claim downward through the mist: this flame is extinguished and held. As long as it stands, the Mist Born are drawn here.

      Mighty Aura: While the conch shell stands, whenever the GM spends Fear at this location they regain 1 Fear. The shell feeds the Mist Born resistance.

      The conch can be physically destroyed. It does not fight back — but it is ancient and dense.
      4 HP — Damage Thresholds: 18 / 30

    questions: What sound does the shell make when it finally cracks? Does something below notice the silence?

featureQuestions:
  - Who built this temple, and did the Fire Born claim it or construct it themselves?
  - How long ago did the Mist Born win this battle — is the blood still fresh, or has the stone had centuries to forget?
  - If the flame is reignited, will the Fire Born come to investigate — and would that be salvation or a new threat?
  - What do the layered inscriptions on the terraces reveal about what each side believed this place to be?
  - Can the temple be both Mist Born territory and a restored flame sanctuary — or does reigniting the flame end the Mist Born claim entirely?
