name: The Silken Spire
tier: 2
category: Exploration
description: A towering castle woven entirely from spider silk, where massive webs connect ancient trees transformed into gleaming white towers that spiral skyward.
impulses: Defend the Queen's domain, lure prey into silk traps, protect the descent to the Brood Throne
difficulty: 14
modifiers:
  - name: Unstable
  - name: Wild Beasts
  - name: Cave Mouth
  - name: Routes
    value: 1
potentialAdversaries: Giant Spiders (ambush hunters), Spider Swarms (defensive hordes), Silk-Wrapped Victims (zombified prey)
features:
  - name: The Queen's Fortress
    type: Passive
    description: |
      The Silken Spire and the Brood Throne beneath it exist as a single unified domain, always appearing together when this location card is drawn during Path generation. The fortress manifests at the edge of the Path as a side branch - a dead-end location that does not connect onward to other Path locations. PCs can see the gleaming white silk towers from the main Path and choose whether to investigate this optional detour. Both locations share the same Unstable modifier state - if one is stabilized using Flame Essence, both become Stable. The Cave Mouth modifier on the Silken Spire represents the silk-wrapped descent shaft that spirals down through the earth to the Brood Throne chamber below. PCs must clear the surface fortress before they can safely access the underground lair.
    questions: How visible is the Silken Spire from the main Path? What draws travelers to investigate this side branch? Does the Spider Queen deliberately position her fortress where it can be seen, or does she prefer secrecy?
  - name: Silk Watchtowers
    type: Passive
    description: |
      The castle's towers are woven from silk around ancient trees that stretch high above the surrounding forest canopy, visible from neighboring locations on the Path. PCs who climb to the top of a tower gain commanding views extending far beyond typical sightlines. They can survey locations up to 2 positions away on the Path network, identifying their general description and any visible modifiers (Mist-Touched, Inhabited, etc.). The elevated position reveals distant threats and opportunities that ground-level travel cannot. Additionally, travelers on neighboring Path locations can see the gleaming white silk towers rising above the treeline - the Silken Spire announces its presence across the mist-shrouded landscape.
    questions: How many towers rise from the fortress structure? What signals or warnings do the spiders send from tower to tower? Do other factions recognize the towers as territorial markers of the Spider Queen's domain?
  - name: The Queen's Emissary
    type: Passive
    description: |
      At the fortress approach, a uniquely marked Giant Spider descends from the towers and positions itself between the PCs and the entrance. Unlike other spiders, this envoy can speak through vibrations that translate into audible words - a gift from the Spider Queen herself. The spider greets travelers with clicking mandibles that form words: "Why do you approach the Silken Spire?" The envoy assesses visitors through their response and behavior. PCs can attempt to communicate peaceful intent, negotiate, or explain their purpose with a Presence roll. On a success, the envoy permits passage into the fortress without triggering alarms. On a failure, the envoy sees through deception or takes offense - combat begins or the spider retreats while releasing alarm pheromones.
    questions: What makes this spider capable of speech when others cannot? How long has it served as the Queen's voice? Does the envoy have its own opinions, or only echoes the Queen's will?
  - name: Sentinel Chamber
    type: Passive
    description: |
      A large silk-wrapped hall where the Queen's guardian spiders rest between patrols, their bodies suspended in hammock-like webs attached to the chamber walls. An encounter with Giant Spiders awaits here. PCs who approach quietly must make a group Finesse roll to pass through without disturbing the resting guardians. On a success, the group moves through silently and the spiders remain asleep. On a failure, or if PCs make excessive noise (combat, shouting, damaging structures), the guardian spiders immediately wake and attack. When the guardians wake, you gain 1 Fear as the spiders' defensive instincts trigger and they coordinate their assault on the intruders.
    questions: How do the guardian spiders organize their rest shifts? What marks or trophies distinguish elite guards from common defenders? Do the spiders communicate through silk vibrations even while sleeping?
  - name: Mushroom Cultivation
    type: Passive
    description: |
      Throughout the fortress, clusters of large mushrooms grow from the silk walls and floors in deliberate patterns - the spiders cultivate these fungi as a food source. PCs can harvest mushrooms with an Instinct roll. On a success, gather 1d4 edible mushrooms that clear 1 Stress each when eaten. On a success with Hope, identify rare medicinal specimens and create a Minor Health Potion (clears Hit Points).
    questions: How did the spiders learn to cultivate fungi? Do specific spider castes tend the gardens? What prevents the mushroom growth from overtaking the entire silk structure?
  - name: Silk Strand Descent
    type: Traversal
    description: |
      At the heart of the Silken Spire, a vertical shaft descends deep into the earth, its walls lined with tightly woven silk cables that spiral downward into darkness. This is the Cave Mouth connection to the Brood Throne below. PCs must climb down thick silk ropes to descend approximately 100 feet to reach the underground throne chamber. The descent requires a group Agility roll. On a success, the group safely reaches the Brood Throne chamber below. On a failure, one PC (players choose) slips on the silk and falls partway down, taking 2d6+3 physical damage and becoming separated from the group - they arrive in a different section of the Brood Throne. On a failure with Fear, the PC's fall sends vibrations through the silk that alert the Spider Queen to their arrival, and she prepares an ambush. PCs can ascend the same way to return to the surface.
    questions: How deep does the shaft descend before reaching the underground chamber? What sounds echo up from the Brood Throne below? Can the spiders cut the silk ropes to trap intruders below or prevent pursuit?
featureQuestions:
  - What ancient power or intelligence granted the Spider Queen the ability to create this fortress?
  - How long has the Silken Spire existed in the mist-shrouded lands?
  - Do other factions trade with the Spider Queen, or is she universally feared?
  - What treasures or secrets does the Spider Queen hoard in the Brood Throne below?
