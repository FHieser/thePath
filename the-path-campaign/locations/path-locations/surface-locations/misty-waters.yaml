name: Misty Waters
tier: 1
category: Exploration
description: A fog-shrouded lake where drowned ruins emerge from dark waters and abandoned structures decay along the shore.
impulses: Conceal dangerous depths, preserve drowned memories, lure the unwary to watery graves
difficulty: 11
modifiers:
  - name: Unstable
potentialAdversaries: Aquatic Beasts (Giant Pike, Bog Shambler), Drowned Spirits, Mist Phantoms
features:
  - name: Missing Feature
    type: Passive
    description: '@todo add a temple/shrine into the middle of the lake. Interacting with the shrine makes the sunken village rise up from its grave and spawn undead/mist creatures??'
    questions: ''
  - name: Hypnotic Roots
    type: Action
    description: The glowing roots beneath the water pulse brighter, creating mesmerizing patterns. All creatures within Close range of the water's edge must succeed on a Presence Reaction Roll or be compelled to move closer to the water. Those who fail while already at the water's edge must make an additional Agility roll to avoid falling in. @todo good idea but this doesn't fit yet
    questions: What causes the roots to glow beneath the water? Are they truly plant matter or something else? What happens to creatures that spend too long staring at the patterns?
featureQuestions:
  - What ancient tragedy caused an entire village to vanish beneath these dark waters?
  - How do the glowing roots connect to the drowned structures below?
  - What valuable knowledge or treasures might be recovered from the sunken buildings?
  - Why does the mist here seem thicker and more persistent than in other areas?
