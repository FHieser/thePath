name: Ancient Crossing
tier: 1
category: Traversal
description: A crumbling stone bridge spans a deep chasm, guarded by broken monuments and treacherous stairs descending into darkness.
impulses: Test courage and balance, preserve forgotten history, warn of dangers below
difficulty: 11
modifiers:
  - name: Unstable
  - name: Cave Mouth
potentialAdversaries: Stone Guardians, Cliff Dwellers, Ancient Spirits
features:
  - name: Crumbling Bridge
    type: Passive
    description: |
      The ancient stone bridge deteriorates with each crossing. Start a Bridge Stability counter at 7. Each time PCs cross the bridge or when the GM spends Fear during bridge encounters, reduce the counter by 1. At 4: Structural cracks widen - loose stones shift dangerously underfoot. The Loose Stone feature (below) now costs 0 Fear to activate. At 2: Extreme instability - every PC who crosses the bridge must mark a Stress as they carefully navigate the treacherous, crumbling footing. At 0: Complete collapse - the bridge crumbles entirely and can no longer be crossed, forcing all future travel through the underground passages.
    questions: How old is this bridge? What civilization built it? What caused such extensive damage over time?
  - name: Shattered Monument
    type: Passive
    description: The broken statue holds fragments of an important inscription. PCs who spend time studying the pieces can make a Lore roll. On a success, learn a general description of one of the nearby environments currently connected to this crossing. On a success with Hope, gain specific mechanical knowledge about a passive, action, or reaction feature in one of the nearby environments.
    questions: Who was honored by this monument? What caused it to be destroyed? What crucial information did the inscription originally contain?
  - name: Descent into Darkness
    type: Action
    description: |
      The crumbling stone steps are treacherous to navigate in either direction. When PCs attempt to ascend or descend the stairs, they make an Agility action roll. On a success: Navigate the stairs safely without incident. On a success with Hope: You help the next person going up or down these stairs - they gain advantage on their roll. On a failure: Gain a Stress as you almost fall but catch yourself at the last moment. On a failure with Fear: Gain a Stress and take 1d8+3 physical damage as loose stones give way and you tumble hard down several steps.
    questions: What lies at the bottom of these ancient stairs? Why were they built leading down from the bridge? What has made its home in the depths?
  - name: Loose Stone Trap
    type: Action
    description: Spend 1 Fear to have a stone become loose under a PC's foot as they move across the bridge. They must mark a stress and make an Agility Reaction Roll. On a failure, they are Restrained until they succeed on a Strength and take 1d4 damage.
    questions: Which stones are most unstable? How deep are the gaps where stones have fallen? What dangers lurk in the crevices below the bridge?
featureQuestions:
  - What ancient kingdom or civilization built this impressive bridge?
  - Why was a monument placed at this specific crossing point?
  - What dangers lurk in the depths that the broken stairs once safely accessed?
  - How might the bridge be stabilized or repaired for future travelers?
