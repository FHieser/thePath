name: Sacred Mountain Pass
tier: 1
category: Traversal
description: A treacherous mountain path leading to ancient ceremonial grounds where a Sacred Flame flickers against the mist.
impulses: Challenge travelers with dangerous terrain, preserve ancient sacred traditions, guard the flame's mysteries
difficulty: 11
modifiers:
  - name: Stable
  - name: Flame-Touched
potentialAdversaries: Mountain Beasts (Giant Eagle, Stone Bear), Flame Guardians, Mist-touched Pilgrims
features:
  - name: Treacherous Path
    type: Passive
    description: The mountain path is narrow and unstable. When moving along the path, PCs must succeed on an Agility roll or mark 1 Stress from a near-fall. On a failure with Fear, they lose their footing and must be rescued or fall Close range down the mountainside.
    questions: What makes this particular section so dangerous? Are there signs of previous accidents? How do experienced mountain travelers navigate safely?
  - name: Sacred Flame Sanctuary
    type: Passive
    description: |
      This location has the Flame-Touched modifier. The ancient Sacred Flame at the mountain shrine provides protection from mist corruption and cleansing power. This location cannot be made Mist-Touched by GM Fear spending. PCs who rest at this location can cleanse mist corruption: Short Rest removes 1d4+Tier Mist tokens from the resting PC. Long Rest removes ALL Mist tokens from the resting PC.
    questions: How does the Sacred Flame respond to each PC? What visions or feelings does the flame inspire? Why does this flame burn when others have been extinguished?
  - name: Flame Essence Extraction
    type: Action
    description: PCs can extract crystallized Flame Essence from the Sacred Flame for use in rituals, village projects, or establishing new sanctuaries. The players can extract up to 3 Flame Essences per visit. For each Flame Essence that is extracted, the GM gains 2 Fear as the mist reacts to the weakened flame and presses closer to the mountain sanctuary.
    questions: What ritual gestures accompany the extraction? How does the flame diminish when essence is taken? Does the mountain itself react to the extraction?
  - name: Mountain Vantage
    type: Passive
    description: |
      Hidden near the Sacred Flame at the peak is an ancient viewing point where the mountain's height pierces through the mist. During the day, PCs can survey the entire current Path configuration spread below, identifying which locations are Mist-Touched by telltale corruption signs - writhing fog patterns, distorted boundaries, unnatural darkness. When PCs camp here overnight and the Path closes, the sea of mist rises to reclaim all Unstable locations, leaving only Stable locations visible like islands in an ocean of white. As the temporary locations vanish, the GM reveals which sanctuaries and anchors persist in the distance, holding firm against the mist's hunger.
    questions: What ancient purpose did this viewing point serve for the flame keepers? How obvious is the corruption when viewed from above compared to ground level? How does the mist rising look from this high vantage point? What sounds accompany the Path's closing? Do the Stable locations glow differently when isolated?
  - name: Star-Reading Summit
    type: Passive
    description: |
      The mountain peak rises high enough that on clear nights, ancient star patterns become visible through the thinning mist. When PCs camp here overnight, they can study the celestial patterns from the Sacred Flame's warmth - a rare moment of peace where the stars shine through the eternal fog. Each PC gains 1 Hope as they connect with something eternal beyond the mist's reach. Like gazing at clouds and deriving shapes, the GM can offer rough hints through constellation patterns:
       - Undiscovered Treasure (hidden caches or valuable resources)
       - Hidden Enemies (lurking threats or ambush sites)
       - Strong History (fragments of pre-mist civilization or lost knowledge)
       - Visit Friends (where allies or helpful NPCs can be found)
       - A Path Forward (the safest route or next destination).
    questions: Do the stars appear different when viewed through Sacred Flame light? What stories do the constellations tell about the world before the mist?
featureQuestions:
  - Why does this Sacred Flame burn when so many others have been extinguished by the mist?
  - What ancient ceremonies gave this mountain pass its sacred significance?
  - How do the treacherous paths serve to test the worthiness of pilgrims?
  - What powerful beings or forces might still guard the sacred sites here?
