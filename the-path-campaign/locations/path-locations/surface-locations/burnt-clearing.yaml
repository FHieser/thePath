name: Burnt Clearing
tier: 2
category: Exploration
description: A scorched forest sanctuary dying from a battle between Fire Born and Mist creatures, where ash drifts like snow and embers refuse to die.
impulses: Echo with past violence, reveal the cost of faction warfare, offer the dying sanctuary's last gifts before it fades
difficulty: 14
modifiers:
  - name: Unstable
potentialAdversaries: The Lost (bandit crew), Mist creatures (encroaching), Desperate Refugees
features:
  - name: Fire-Scarred Sentinel
    type: Counter System
    description: |
      The massive blackened tree still holds remnants of its ancient protective essence. Start a Sentinel Protection counter at 7. Each time PCs visit this location, reduce the counter by 1. While the counter is above 0, the tree's lingering power provides protection against mist corruption - it costs 2 additional Fear to make this location Mist-Touched. At 3: The tree's bark begins to crumble and its protective aura visibly dims. At 0: The tree's protection fails completely - this benefit is lost and the location becomes vulnerable to mist encroachment.
    questions: What will happen to the sanctuary when the tree's protection finally fails? Can the tree's essence be restored, or is its death inevitable? What signs show the tree's power fading with each visit?
  - name: Ash Drift
    type: Action
    description: Spend 1 Fear to have ash swirl up in choking clouds from the scorched ground. All creatures in the affected area have their vision obscured to Close range and have disadvantage on ranged attacks and Instinct rolls to perceive their surroundings until the ash settles (end of the scene or when strong wind clears it).
    questions: Do the ash clouds reveal hidden threats or conceal them further? What memories or visions might emerge from disturbed ash? How do The Lost navigate through these constant ash storms?
  - name: Ember Core
    type: Passive
    description: The ground glows with an unsettling, ominous light born from the tree's unhealed wounds. The flickering flames cast distorted shadows and illuminate the entire clearing in sickly orange hues. PCs spending extended time in this clearing (more than 1 hour) must make a Presence roll. On a failure, mark 1 Stress from the oppressive atmosphere of lingering pain and violence. On a failure with Fear, mark 1 Stress and lose 1 Hope as the flames seem to whisper accusations and memories of the battle.
    questions: What shadows and shapes do the flames cast that unnerve visitors? Do the flames grow brighter or dimmer when someone suffers nearby? Can the oppressive atmosphere be lifted, or is it permanent?
  - name: Spring Grotto
    type: Passive
    description: A small cave beneath the Fire-Scarred Sentinel where an underground spring still flows, untouched by flames. The cool water and living moss provide natural healing. PCs who rest here for at least 1 hour can clear 1 Stress. The grotto can only accommodate 3 people at a time.
    questions: Who controls access to this healing sanctuary? How long can the spring sustain its healing power?
featureQuestions:
  - What happened to the Fire Born and Mist Born who fought here?
  - How long before the sanctuary's protection fails completely and mist consumes it?
  - Could the burnt forest regenerate?
