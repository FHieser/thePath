name: Mechanic's Workshop
tier: 3
category: Exploration
district: 3,1

connections:
  - Craftsmen's Ward
  - Old Gate
  - City Gates (entry point from outside)

description: |
  The outer district known informally as the Millward — three distinct areas sharing the same waterway: the old lumber yard to the east, the charcoal quarter to the west, and the mechanic's hidden workshop at the center. The whole district has been left to its own devices. Overgrowth has taken everything. The waterway still runs. The mill wheel still turns. It is the only district in the city where nature has reclaimed something — and the only district where something is still actively working.

impulses: Conceal, regrow, left to its own devices

difficulty: 16

modifiers:
  - name: Crystal-Plague
  - name: Mist-Touched
  - name: Unstable
  - name: Mushroom Circle

potentialAdversaries: Crystal Zombie, Crystal-Fused Guard, Trap Crystal

features:
  - name: The Green Waterways
    type: Passive
    description: |
      Decades of unchecked growth have turned this district into a tangle of root, moss, and slow water. Channels cut the ground into uneven islands — dark water where cobblestones used to be, banks thick with reeds and fern. Vines pull at doorframes. Waterways shift the layout without warning, ending paths mid-step at the water's edge.

      While in this district, Agility checks have disadvantage. Players moving carefully can treat this as normal terrain — but careful movement means slow movement.

      When a fight breaks out here, set the combat area as disrupted by waterways — channels divide the space, forcing movement around them. Players and enemies cannot move freely across the district without crossing water.
    questions: What grows here that doesn't grow anywhere else in the city? Does anything live in the water?

  - name: The Broken Bridge
    type: Passive + Action
    description: |
      A waterway separates the Millward from adjacent districts. The banks are thick with brush — nearly impassable without a crossing point. What remains of the bridge is buried under decades of growth: broken stone, collapsed planking, and thick branches woven together into something that barely holds shape. It doesn't look like a bridge anymore.

      Finding it — Players must succeed on an Instinct roll to locate the crossing through the overgrowth. On a failure, the bank stretches with no obvious way through. A robot crossing it reveals the path automatically — no roll required.

      Crossing it — Once found, crossing requires an Agility roll. On a failure, the player slips into the waterway below.

      Forcing through — Players can push through the thick brush on the bank instead of finding the bridge. Each player who does must spend 3 resources — distributed freely across Hope, Armor Slots, Stress, or HP.
    questions: Is there anything on the other side of the brush that makes forcing through worse than it looks?

  - name: The Charcoal Chimneys
    type: Action
    description: |
      A dozen stone chimneys rise above the charcoal quarter — remnants of the old kilns, scattered at irregular intervals. From a distance they all look identical.

      Ember Beetles move through the district in slow, glowing clusters — jet-black with orange abdomens lit like cooling coals. Players who watch them long enough see they all travel in the same direction and disappear through a small crack near the base of one chimney.

      The crack is too narrow to enter. Players can widen it by spending 5 resources to clear loose stone until the opening is large enough to squeeze through. Inside — a sealed ecosystem of moss, fungi, and roots. A mushroom ring covers the floor.

      This location gains the Mushroom Circle modifier.
    questions: How did the fey ring form inside a sealed chimney? Is there something else living in here with the beetles?

  - name: The Watermill
    type: Passive + Action
    description: |
      The mill wheel turns — barely. One slow, creaking rotation every several minutes. The mechanism inside clicks with ancient regularity — the only mechanical sound in the city. The mill powers the workshop and, through a network of brass gears, every robot still running in the city. The mill is not disturbing to look at. It is disturbing that it has not stopped.

      The watermill is visible from the workshop, but the path between them is blocked by decades of collapsed lumber — planks, beams, and rotted timber from the yard. At the lowest point, the blockage has dammed the waterway entirely. The lumber yard behind it is flooded — a still, dark basin where the old loading dock went under. Something catches the light at the bottom. Clearly old. Clearly untouched.

      Clearing the Blockage — Requires sustained effort. Players spend resources to clear timber and redirect the waterway.

      First upgrade (5 resources) — Enough cleared to redirect the waterway. The mill speeds up. The basin drains as the dam breaks. Something is visible at the bottom — old, untouched, catching the light. Robot encounter chance increases: present on a 9 or 10.

      Second upgrade (7 more resources) — Full path to the mill cleared. The wheel turns properly for the first time in decades. Robot encounter chance increases again: present on an 8, 9, or 10.

      Resources are distributed freely across the group — each player marks whichever combination of Hope, Armor Slots, Stress, or HP they choose.
    questions: Could the mill be stopped entirely? What would happen to the robots if it did? What is at the bottom of the basin — did it sink with the dock, or was it placed there?

  - name: The Workshop
    type: Action
    description: |
      Before the door: ticking. The watermill's mechanism feeds in here — the sounds of it fill the room.

      The room is clean.

      A large table holds the skeleton of a robot. Against one wall, a mechanism fitted with a mounting in the rough shape of a humanoid — a finished robot stands inside it. Several robots are lined at the wall, waiting their turn. From time to time one steps in to recharge.

      In the corner near the door, a built robot stands still. Touch it — it springs to life and begins cleaning.

      Players can find a notebook with schematics for building a robot.

      In the far corner, a workbench. He is here. Vial in hand, looks like sleeping — young face encased in crystal. A blanket across his back, as if someone wanted to let him sleep.

      On the table in front of him, a letter:

      "I am letting the bots run via the Watermill mechanism in hopes they can still help people after I am gone. I am sorry for not being able to help in another way, but I want to think that this was useful in its own way."
    todo:
      - Something buildable here using the robot schematics — city-related utility item or tool

featureQuestions:
  - How did the mechanic keep the workshop hidden while the city was still alive?
  - Do the robots behave differently here than in other districts — do they interact with their creator's body?
  - Is there any sign the mechanic left deliberately — anything addressed to whoever found this place?
  - What was the district called before the plague? Did anyone know the mechanic lived here?
