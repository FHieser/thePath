name: Flooded Network
tier: 1
category: Traversal
description: |
  A network of water-filled tunnels and chambers where underground springs feed dark lakes and ancient machinery still turns with the current.
impulses: |
  Channel water through hidden passages, power forgotten mechanisms, test endurance and navigation skills
difficulty: 11
modifiers:
  - name: Unstable
  - name: Underground
potentialAdversaries: Aquatic Predators (Giant Pike, Tunnel Eel), Water Spirits, Mechanical Guardians
features:
  - name: Network Traversal
    type: Counter System
    description: |
      Navigating through the flooded tunnels requires persistence and careful progress. Start a counter at 0. Each time PCs make progress through the network (successful navigation attempts, solving water puzzles, or finding shortcuts), increment the counter by 1. When the counter reaches 4, the PCs successfully traverse the entire network and emerge at their destination. @todo add the aproaches to solve this here
    questions: |
      Which routes through the tunnels are safest? How do water levels affect available passages? What landmarks help navigate in the dark waters?
  - name: Underground Lake Crossing
    type: Passive
    description: |
      Dark bodies of water block key passages throughout the network. When PCs encounter a lake crossing, they must choose their approach: swim directly (Strength roll), find a way around (Instinct roll), or use the machinery. Success advances the traversal counter, while failure may trigger other features or require alternate routes.
    questions: |
      How deep are these underground lakes? What dangers lurk beneath the dark waters? Are there hidden stepping stones or platforms?
  - name: Ancient Water Wheel Control
    type: Action
    description: |
      Massive brass and iron machinery can be operated to change water levels and open new passages. When PCs attempt to use the water wheel, make a Lore roll. On a success, advance the traversal counter and choose to either drain a flooded passage or raise water to access higher tunnels. On a failure, trigger the Hydraulic Surge feature.
    questions: |
      What was this machinery originally designed to accomplish? How do different wheel positions affect the water flow? What happens if multiple wheels are operated simultaneously?
  - name: Hydraulic Surge
    type: Reaction
    description: |
      When the ancient machinery malfunctions or PCs fail to navigate properly, water pressure builds dangerously. All PCs must succeed on a Strength Reaction Roll or be swept backwards (lose 1 from traversal counter, minimum 0) and mark 1 Stress from the turbulent waters. The surge also attracts aquatic predators to investigate the disturbance.
    questions: |
      What causes the water pressure to build so dramatically? How quickly does the surge travel through the tunnels? Are there safe alcoves to shelter during surges?
featureQuestions:
  - What ancient civilization engineered this sophisticated underground water system?
  - How do the water wheels connect to create a network-wide hydraulic system?
  - What shortcuts or secret routes might experienced tunnel navigators know?
  - Could mastering this system provide access to other underground locations?
