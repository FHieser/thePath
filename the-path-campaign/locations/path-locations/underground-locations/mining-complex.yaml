name: Mining Complex
tier: 1
category: Exploration
description: |
  An abandoned underground mining operation where old equipment remains scattered and mysterious sealed doors guard unknown secrets.
impulses: |
  Reveal industrial history, conceal dangerous mining hazards, guard whatever lies behind sealed barriers
difficulty: 11
modifiers:
  - name: Unstable
  - name: Underground
potentialAdversaries: Mining Constructs, Tunnel Dwellers, Sealed Horrors
features:
  - name: Central Hub Equipment
    type: Passive
    description: |
      The main chamber contains abandoned mining gear, tools, and equipment scattered throughout the area. PCs who search carefully can make an Instinct roll. On a success, salvage useful equipment or mining tools. On a success with Hope, find valuable materials or gems overlooked during the evacuation. The equipment also provides clues about why the mining operation was abandoned.
    questions: |
      What valuable materials were being extracted here? Why did the miners abandon their equipment so hastily? What tools might still be functional after all this time?
  - name: Ancient Sealed Door
    type: Passive
    description: |
      A massive reinforced barrier blocks access to deeper sections of the complex, clearly designed to keep something either in or out. The door bears warning symbols and multiple locking mechanisms. PCs can attempt to open it with a Strength roll (requires multiple successes) or try to bypass the locks with a Finesse roll. Success grants access but may release whatever was contained.
    questions: |
      What did the miners discover that required such extreme containment measures? Are the warnings about keeping something in or keeping explorers out? What lies beyond this formidable barrier?
  - name: Mining Cart Rail System
    type: Action
    description: |
      Old tracks snake throughout the complex, with some mining carts still resting on the rails. PCs can attempt to use the cart system for rapid transport through the tunnels by making an Agility roll. On a success, quickly traverse sections of the complex or access areas that would otherwise be difficult to reach. On a failure, the cart derails or crashes, potentially causing injury.
    questions: |
      Where do the different rail lines lead within the complex? Are any sections of track damaged or blocked? What powered the original mining cart system?
  - name: Structural Instability
    type: Reaction
    description: |
      The abandoned mining has left the complex structurally compromised in places. When PCs cause vibrations through combat, explosions, or heavy equipment use, spend a Fear to trigger a partial collapse. All creatures in the affected area must succeed on an Agility Reaction Roll or take 1d8+3 physical damage from falling debris and become trapped until they can be dug out.
    questions: |
      Which areas of the complex show the most dangerous structural damage? What mining practices led to such instability? Are there ways to shore up dangerous sections for safer exploration?
featureQuestions:
  - What valuable ore or materials justified such an extensive underground mining operation?
  - What discovery caused the miners to seal certain areas and abandon the complex?
  - Could the mining equipment and rail system be restored to working condition?
  - What dangers might be released if the sealed barriers are breached?
