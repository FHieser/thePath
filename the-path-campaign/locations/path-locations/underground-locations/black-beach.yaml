name: Black Beach
tier: 2
category: Exploration
description: |
  An impossible underground shore where black sand meets dark waters, illuminated by dancing witch lights and dominated by an ancient bleeding altar rising from the depths.
impulses: |
  Preserve ancient sacrificial rites, test travelers' resolve, guard secrets beneath black waters
difficulty: 14
modifiers:
  - name: Unstable
  - name: Underground
potentialAdversaries: Eeligator, Ancient Spirits, Drowned Dead
features:
  - name: Black Shore
    type: Passive/Hazard
    description: |
      Fine black sand beaches ring the edges of the flooded cavern, providing narrow strips of safe ground before giving way to the lake. The underground lake is deceptively shallow - only 3-4 feet deep - but the water is thick, viscous, and pitch-black from dissolved minerals. **Crossing the water is mandatory** to traverse this location. Moving through the water is treacherous - PCs have **disadvantage on Agility rolls to reposition** as the thick liquid obscures the uneven bottom. PCs who enter the water without proper tribute will encounter **the monster lurking in the lake**.
    questions: |
      How wide are the black sand beaches? What makes the water so viscous? Can you see anything beneath the surface?
  - name: The Bleeding Altar
    type: Passive/Action
    description: |
      When travelers arrive at the black shore, an **ancient altar rises from the lake**, its stone channels weeping fresh blood. When a PC makes a **blood sacrifice of 3 HP** at the altar, the blood flows through the channels and a massive **black stone bridge** rises from the water, creating safe passage across the lake. The bridge remains raised until all PCs have crossed. The lake's guardian will not attack those who walk the raised bridge. Only blood works - the altar rejects all other offerings.
    questions: |
      What ancient civilization built this altar? Why does it still bleed? What pact binds the creature below?
  - name: The Witch Lights
    type: Passive/Action
    description: |
      Bioluminescent fungal growths protrude from the shallow water, rising 2-5 feet above the surface and glowing with eerie green and blue luminescence. These "witch lights" create islands of solid ground in the flooded cavern. PCs can climb onto these growths to gain **higher ground** (+1 to attack rolls against targets in the water below). The GM can spend **1 Fear** to have a witch light **rapidly grow**, extending upward and outward to create a **new island of solid ground**. As it grows, the fungus **releases thick clouds of spores** - all PCs standing on or within Close range of that witch light must **mark 1 Stress** from inhaling the spores. The witch light grows in hopes that something dies atop it, providing nutrients for further expansion.
    questions: |
      What are these fungal growths? Do they feed on corpses? Can the spores be harvested or weaponized?
  - name: The Blood Channels
    type: Passive/Action
    description: |
      Carved stone channels run through the shallow water, glowing faintly when sacrificial blood flows from the altar. The channels lead to **a circle of standing stones** visible from the altar, covered in ancient pilgrim script. PCs who **wade into the water** to examine the stones can make a **Knowledge roll (Difficulty 14)**. On a **success**, decipher the writing and learn **the exact wording of one Feature** from a Path location of their choice (GM reads that feature's full text). On a **Success with Hope**, learn **two Features** instead of one. On a **failure with Fear**, the disturbance attracts the lake's guardian - **it attacks even though the bridge is raised**, ignoring the ancient pact to punish those who dishonor the memorial.
    questions: |
      What language is carved on the stones? How did pilgrims record this knowledge? Do the carvings glow when blood flows?
featureQuestions:
  - What ancient civilization created the altar and blood channel system?
  - How did the pact between the altar and the lake's guardian originate?
  - Are the memorial stones still being updated with new pilgrim knowledge?
  - What happens to the sacrificial blood after it flows through the channels?
  - Can the witch lights' spores be cultivated or controlled?
