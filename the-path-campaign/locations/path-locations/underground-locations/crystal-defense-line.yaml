name: Crystal Defense Line
tier: 3
category: Traversal
description: |
  The inner rail segment of the Copper Rust Clan's network, running closer to the heart of their operation and fortified accordingly. A massive gate cavern marks the midpoint — proper stonework, arbalest positions, a raisable door built for exactly the kind of threat that eventually came. Beyond it, the rails push into crystal-growth tunnels where a meteorite's material has seeped down through a blocked surface shaft. The Clan never opened it. The creatures that come through don't need it open.
tagline: They built this line to hold. It held. Just not against what came from inside.
impulses: |
  Test whether the defenses still serve their purpose, reveal what the Clan knew was coming, let the crystal press inward
difficulty: 17
modifiers:
  - name: Unstable
  - name: Underground
  - name: Connection 2
potentialAdversaries: Crystal Golem, Crystal Walkers, Mist Constructs
features:
  - name: The Drift Carts
    type: Passive
    description: |
      Copper carts inlaid with rune-work along their base. As a cart moves, it draws ambient stone magic from the tunnel walls through the rails and feeds it back into acceleration. A skilled handler bleeds off excess draw. Left unchecked, the cart accelerates beyond control. The rune-work requires worked stone to function — natural caverns break the circuit, and carts always stop at cavern thresholds.

      Three ways to travel the line:

      Controlled Ride: One PC makes an Instinct or Strength reaction (Difficulty 17). Roll d20 for the section encounter. On failure, the cart enters Fast Mode.

      Deliberate Fast Mode: No throw required. The party chooses speed. Skip the current section and chain immediately to the next. Roll d20 with the Fast Mode table. Caverns always stop the cart.

      Walking: No roll. Each section costs 1 Stress. Players may stop at caverns freely.
    questions: |
      The rune-work here is the same as the Outer Mine Line — does it feel less maintained? More? Did the Clan spend more time on these inner rails, or less?

  - name: Rail Sections
    type: Action
    description: |
      Three tunnel sections run between the line's entrance, the two cavern stops, and the exit. Each section is resolved with a d20 roll.

      Structure: Entrance → Section 1 → Fortified Gate → Section 2 → Meteorite Shaft → Section 3 → Exit

      Controlled Ride (d20):
      1: Dangerous — see Derailment
      2-3: Tedious — see Track Work
      4-18: Well maintained — smooth travel, automatic progress
      19-20: Something Interesting — see Found on the Line

      Fast Mode (d20):
      1-3: Dangerous, escalated — see Derailment
      4-20: Skip to next section. Roll d20 again and make another control reaction.

      In Fast Mode, a 19-20 (interesting) blurs past — players glimpse it but cannot stop.
    questions: |
      The crystal growth near the Meteorite Shaft thins as it approaches this rail — how far has it spread along the track itself?

  - name: Derailment
    type: Reaction
    description: |
      The cart hits damaged track or a tight corner and leaves the rails. All PCs take 1 HP damage from the impact.

      After a derailment the party chooses:
      - Re-rail the cart: resolve Track Work. In escalated Fast Mode, the resource cost is doubled.
      - Continue on foot: walk the remaining sections (1 Stress per section).
    questions: |
      What caused this section's damage — crystal growth forcing the track out of alignment, or the Clan's own hasty retreat?

  - name: Track Work
    type: Action
    description: |
      A section of track is blocked, warped, or needs clearing before the cart can pass. The party spends resources equal to the number of players. Resources can be drawn freely from Hope, Stress, HP, or Armor — players distribute the cost however they choose.

      Players who cannot or choose not to spend resources walk the remaining sections instead (1 Stress per section).
    questions: |
      Is the blockage mechanical damage or crystal growth beginning to creep onto the rails?

  - name: Found on the Line
    type: Passive
    description: |
      On a 19-20 during a controlled ride section, the party finds something the Clan left behind. Roll a d4:

      1 — Sure Rails: A pristine section of rune-work. The next control reaction is made at advantage.
      2 — Clear Track: Ideal route ahead. Roll the next section's d20 twice and take either result.
      3 — Maintenance Kit: A Clan tool satchel, still stocked. Can be spent to skip one Track Work result entirely.
      4 — Copper Sculpture: A small carved figure in a wall niche. Half the party (rounded up) each gains 1 Hope. Players distribute as they choose.
    questions: |
      The sculptures appear closer to the defensive gate than anywhere else on the network. Did someone spend time here?

  - name: The Fortified Gate
    type: Passive/Action
    description: |
      The rail line opens into a wide cavern shaped entirely by Clan hands — smooth floors, elevated stone platforms flanking the track, proper structural arches overhead. Arbalest positions face the crystal side. The raisable door is up when players arrive, its back surface — inlaid with rail track — held vertical, blocking the line ahead. When the door is lowered, its rail section drops flat and extends the track forward.

      Lowering the door: A release mechanism on the wall drops it automatically. No roll required — it falls under its own weight and locks into place.

      Raising the door:
      - Solo: Requires 2 consecutive successful Strength reactions (Difficulty 18). Failing either roll means starting over from scratch.
      - Group (3 or more): Each PC spends 2 actions simultaneously. When all actions are committed together, the door rises.

      Arbalest Positions: Several loaded arbalests remain in their mounts, facing toward the Meteorite Shaft side. Players may use them.
      - Attack with Finesse. On a hit, deal 3 HP damage.
      - Each arbalest holds 1 bolt. Reloading takes 1 action.
    questions: |
      Why is the door currently up — did the Clan raise it as they retreated, or was it raised long before the attack? Are there bolts left in storage, or only what's already loaded?

  - name: The Meteorite Shaft
    type: Passive/Action
    description: |
      The tunnel opens into a cavern where crystal growth covers the walls and ceiling in pale, faintly glowing formations — thickest near a blocked vertical shaft in the ceiling, thinning toward the direction of the Fortified Gate. The shaft connects to a meteorite impact site on the surface above. The Clan identified it and sealed it. The seal holds the passage closed — players cannot ascend until they acquire the means to open it.

      The seal does not stop what lives near the impact site from pushing through.

      Crystal Creatures: The GM may spend 2 Fear to have a crystal creature emerge from the shaft. The seal slows but does not prevent them.

      Fast Mode Entry: If the cart enters this cavern in Fast Mode — deliberate or failed control — the impact noise and vibration wake the crystal creatures immediately. An encounter begins without a Fear spend.

      The Shaft: The crystal growth has sealed the passage — formations thick enough to block any ascent. Players who clear the crystals could open a route to the surface above the meteorite impact site.
    questions: |
      How long has the crystal been growing here? Is the shaft wide enough to climb once cleared? What is visible through the crystal growth — can players see light above, or only pale formations?

featureQuestions:
  - What did the Clan learn about the meteorite material that made them build the Fortified Gate rather than simply abandon this section of track?
  - Has anything come through the shaft since the Clan abandoned this line?
  - Could the arbalest bolts be tipped with something to make them more effective against crystal creatures?
  - If the door is raised to seal the crystal side, does that solve the problem — or does it only delay it?
  - What is on the surface directly above the meteorite shaft, and can it be reached another way?
