# The Path - Items
# Sorted by type: General first, then faction items grouped by faction name

# ============================================================
# GENERAL ITEMS
# ============================================================

- name: Hope in a Bottle
  type: General
  usage: Consumable
  flavor: "A small glass vial filled with warm golden light that sloshes like liquid sunshine."
  effect:
    category: Restoration
    description: |
      Drink the vial to gain 1 Hope. If you currently have no Hope, gain 2 Hope instead.

- name: Circle Ash
  type: General
  usage: Consumable
  flavor: "Fine grey ash that drifts against the wind when released near fey-touched ground."
  effect:
    category: Utility
    description: |
      Throw the ash into a Mushroom Circle. The particles swirl and drift toward the direction of linked Mushroom Circle locations, showing you which way to face before stepping in.

- name: Archon's Reserves
  type: General
  usage: Reusable
  flavor: "A dark glass vial etched with ancient channel-marks, always faintly warm to the touch."
  effect:
    category: Utility
    description: |
      Spend 1 HP at any time to fill the vial with your blood. The vial holds 1 HP of blood. Pour the filled vial at a location that requires a blood sacrifice to count as 1 HP of sacrifice. Multiple vials can be used together to meet higher sacrifice costs.

- name: Deadnerve
  type: General
  usage: Consumable
  flavor: "A bitter black paste that numbs the tongue and quiets the mind."
  effect:
    category: Restoration
    description: |
      Can only be consumed during an encounter. Clear 2 Stress.

- name: Firepatch
  type: General
  usage: Consumable
  flavor: "A rough bandage soaked in alchemical fire that sears wounds shut on contact."
  effect:
    category: Restoration
    description: |
      Can only be used during an encounter. Press it against an open wound to heal 2 HP. Mark 2 Stress - the burning is excruciating.

- name: Rushpowder
  type: General
  usage: Consumable
  flavor: "A pinch of sharp white powder that makes the air taste like lightning."
  effect:
    category: Enhancement
    description: |
      Can only be inhaled during an encounter. Gain advantage on all Agility rolls for the rest of the scene.

- name: Rapid Mutator
  type: General
  usage: Consumable
  flavor: "A crude syringe of dark red compound that smells of iron and copper wire — the Archon's handwriting is on the label, neat as a death sentence."
  effect:
    category: Restoration
    description: |
      Inject during an encounter. Regain 5 HP. Gain 2 Stress. Mark your first unmarked Hit Point — this slot cannot be healed until you spend a Long Rest action to regenerate it.

- name: Iron Nerve Paste
  type: General
  usage: Consumable
  flavor: "A grey-black paste that smells faintly of copper and old stone. Applied to the temple, it doesn't numb the pain — it convinces you the pain was never worth feeling."
  effect:
    category: Restoration
    description: |
      When you would mark Stress from any source, you may apply a dose as a reaction to negate that Stress instead. The paste has 3 uses per Long Rest.

      Each time you use a dose, the next time you would recover Stress (from any source), you recover 1 less Stress for each dose used since your last Long Rest. If this reduces your recovery to 0 or less, you recover no Stress from that source.

- name: Red Eye
  type: General
  usage: Reusable
  flavor: "A plague crystal fused with mist essence and blood — look into it and the dark coils move, and something inside looks back."
  effect:
    category: Restoration
    description: |
      Hold the Red Eye and focus. Regain 1 HP and clear 1 Stress. Gain Mist tokens equal to the number of times you have used the Red Eye since your last Long Rest.

      First use: +1 Mist token. Second use: +2 Mist tokens. Third use: +3 Mist tokens.

      The usage counter resets on a Long Rest.

- name: Silkweaver
  type: General
  usage: Reusable
  flavor: "She fits in a palm, weighs almost nothing, and the silk she produces is flawless — the Queen does not give gifts lightly."
  effect:
    category: Utility
    description: |
      Each Long Rest, the Silkweaver spins one silk item. Describe what you
      weave; the GM assigns a minor utility effect appropriate to its form
      (a length of rope, a wrapped bundle, a woven strip, a simple garment).

      Each Short Rest, in plain sight, the spider spins a small open-weave
      net and releases it to the wind. It drifts away on the breeze — visible
      to anyone watching, gone within moments. The net carries encoded
      information: scent-traces, the shape of where you have been, the faces
      of those nearby. The Queen's drones intercept these nets. She
      accumulates knowledge of your movements and will act on what she
      learns when the time is right.

# ============================================================
# ROOTBOUND ITEMS
# ============================================================

- name: Dreaming Bark
  type: Rootbound
  usage: Consumable
  flavor: "A strip of pale bark that tastes of soil and sleep. Chew it and the world behind your eyes opens."
  effect:
    category: Utility
    description: |
      Consume the bark to enter a brief trance. The GM reveals all face-down location cards adjacent to your current location on the Path grid. Mark 1 Stress for each card revealed - the visions come at a cost.

- name: Lullroot
  type: Rootbound
  usage: Consumable
  flavor: "A soft, fibrous root that smells of rain-soaked earth and quiet evenings."
  effect:
    category: Restoration
    description: |
      Can only be consumed during a rest. Clear 1 Stress and heal 1 HP.

- name: Dewcleanse
  type: Rootbound
  usage: Consumable
  flavor: "A pouch of dried herbs that blooms into fragrant tea when steeped in warm water. Quite some powerful stuff, but takes a while to get going. Tastes good too."
  effect:
    category: Restoration
    description: |
      Brew during a rest. Every player who is resting may drink and remove 2 Mist tokens. Preparing the tea takes time - it cannot be rushed or brewed during an encounter.

# ============================================================
# FIRE BORN ITEMS
# ============================================================

- name: Flame Bearer's Amulet
  type: Fire Born
  usage: Reusable
  flavor: "A flat disc of alien metal, warm to the touch even in the deepest mist, inscribed with symbols no mortal language reads."
  effect:
    category: Protection
    description: |
      Once per Long Rest: when you would gain a Mist token, negate 1 token. The amulet grows cold after use and must be warmed again through rest near flame.

- name: Flame Blade
  type: Fire Born
  usage: Reusable
  flavor: "An ancient blade of alien metal that runs hot in the hand — the flame inside it does not care whose blood it burns."
  effect:
    category: Disruption
    description: |
      Two-handed. Attacks use Strength or Agility (wielder's choice).

      When drawn, lose 3 HP and remove 2 Mist tokens from yourself. The blade's fire burns the mist corruption out of the wielder as it ignites.

      While drawn: d10+7 damage — Powerful (on a successful attack, roll an additional d10 and discard the lowest result) — Burning (when you roll max damage on a damage die, the target must mark a Stress).

      The blade goes dormant when sheathed and must be drawn again to use.

- name: Flashburn
  type: Fire Born
  usage: Consumable
  flavor: "A compact torch that flares with blinding sacred light, pushing the shadows back - but they always return deeper."
  effect:
    category: Restoration
    description: |
      Light the Flashburn. Distribute 3 Hope among the players. The GM gains 2 Fear - the mist recoils from the flame but the shadows grow larger in answer.

# ============================================================
# BRASS MECHANICORUM ITEMS
# ============================================================

- name: Br4ss Filt3r
  type: Brass Mechanicorum
  usage: Reusable
  flavor: "A small cylindrical device of polished brass and crystal mesh that hums faintly, drawing moisture from the air."
  effect:
    category: Protection
    description: |
      While carried, the Br4ss Filt3r absorbs Mist tokens before they reach you. It can absorb up to 3 Mist tokens total. Once full, it stops working and must be replaced or repaired by the Brass Mechanicorum.
