name: The Spider Colony
id: spider-colony
alignment: Neutral
tier: Established

identity:
  description: |
    A vast underground empire ruled by an intelligence no one expected. The Spider Queen and her thousands of offspring hunt, hoard, and survive with ruthless pragmatism. They are not evil — they are hungry. And they are very, very organized.
  themes:
    - Hunger as the root of all violence
    - Pragmatic alliance versus moral complicity
    - Intelligence without morality
    - A colony as a single organism with one sovereign will

history:
  origin: |
    No one knows how the Spider Queen gained her intelligence. Two theories circulate: that she consumed a powerful mage and absorbed their intellect, or that she was drawn to and transformed by the Ancient Foundation Engine buried beneath her throne — a pre-Mist machine whose purpose she has never understood, but has always felt.
  events:
    - name: The Claiming of the Brood Throne
      description: |
        The Queen discovered the pre-Mist ruins and built her throne directly above the Ancient Foundation Engine, instinctively drawn to its protective resonance. The colony grew outward from this fixed point, silk spreading through every tunnel within reach.
    - name: The Hundred Caravan Raids
      description: |
        Over generations of Path travelers, the colony systematically ambushed caravans using the Silken Spire as a trap. The wealth of a hundred trade runs now hangs silk-wrapped in the Brood Throne. The Queen keeps everything — she has no concept of excess.

goals:
  primary: Secure a reliable food source for the colony
  secondary:
    - Repair the Ancient Foundation Engine
    - Expand hunting territory through the underground network
    - Gather Path intelligence from across the underground
  long_term: Establish permanent dominance over all underground routes on the Path

territory:
  type: Fixed Underground
  description: |
    The colony controls the Silken Spire (surface) and Brood Throne (underground) — a Linked pair that forms the only point where the colony maintains surface access. The tunnel network spreads outward from the Brood Throne but the Queen rarely leaves her chamber.
  locations:
    - Silken Spire
    - Brood Throne

mist_protection:
  type: Engineered
  description: |
    The Ancient Foundation Engine beneath the Brood Throne generates a resonance that keeps the mist from fully penetrating the location. The engine is currently damaged, which is why the location carries the Unstable modifier. The Queen does not fully understand the engine but feels its presence — it is the reason she built her throne here.

subgroups:
  - name: The Brood
    role: Colony labor and expansion
    description: |
      The vast mass of standard spiders — hunters, web-spinners, egg-tenders. They operate on the Queen's pheromone commands. Not individually intelligent but collectively relentless. When the colony is hungry, the Brood pours out across the Path without coordination or mercy.
  - name: Elite Guardians
    role: Defense and enforcement
    description: |
      Larger, more powerful spiders who protect the Brood Throne chamber and escort the Queen. Capable of coordinated tactical behavior. Distinguished by deep red markings on their carapace.
  - name: The Emissary
    role: Diplomatic representative
    description: |
      A uniquely marked spider gifted with speech by the Queen. There is only ever one at a time. Speaks for the Queen to all outsiders. When the Emissary dies, the Queen creates a new one within days — the knowledge transfers somehow.

relationships:
  - faction: fire-born
    stance: indifferent
    description: |
      Fire is a hazard, not a religion. The Colony avoids flame-touched locations as a matter of survival, not ideology. Fire Born are not prey and not allies.
  - faction: brass-mechanicorum
    stance: unknown
    description: |
      The Queen is aware that the Foundation Engine shares characteristics with Brass Mechanicorum construction. She has not yet made contact. If she did, she would have very specific questions.
  - faction: rootbound
    stance: wary
    description: |
      Nature-aligned beings who operate near the surface. The Colony avoids their territory — roots disrupt silk, and Rootbound fight back effectively. Mutual avoidance by unspoken agreement.
  - faction: mist-born
    stance: hostile
    description: |
      Mist Born encroach on hunting territory. The Colony drives them out when possible. Not a philosophical conflict — purely territorial.
  - faction: deep-dwellers
    stance: competitive
    description: |
      Underground territory overlap creates constant friction. Neither side has decisively won control of the deeper tunnels. Low-level skirmishes are ongoing.
  - faction: flame-seekers
    stance: predatory
    description: |
      Mortals traveling the Path are the colony's primary food source. Flame Seekers are prey unless they have proven otherwise or made an arrangement.
  - faction: ember-traders
    stance: transactional
    description: |
      Traders occasionally approach the Silken Spire to attempt commerce. The Queen will sometimes trade hoarded caravan goods for food deliveries. Purely practical.
  - faction: mist-clergy
    stance: hostile
    description: |
      The Mist Clergy have attempted to use Mist Born to destabilize the colony's territory. The Queen regards them as a long-term threat and remembers every incursion.

item_identity:
  theme: |
    Silk-woven artifacts and venom-infused tools. Effects tend toward Entanglement and Paralysis — restraining, slowing, or incapacitating targets. Items feel organic and unsettling: warm, slightly sticky, faintly vibrating as if something alive is coiled inside. They perform best underground and lose potency in direct sunlight.
  cost: |
    Spider silk items require periodic maintenance — re-coating with the Queen's web fluid, or they dry out and lose elasticity within weeks. Some carry a residual paralytic charge that can affect the bearer under conditions of extreme stress.

rumors:
  - >
    "You can negotiate with them. Someone did, years ago. The spiders left his caravan alone for three
    seasons. Then one day he stopped paying and they took everything, including him."
  - >
    "The Spider Queen can see through any web in her territory. Don't say anything near silk you
    didn't spin yourself."
  - >
    "There's a Brass Mechanicorum somewhere down in those tunnels — been there for decades. The
    spiders won't touch it. Nobody knows why."
  - >
    "The Queen doesn't attack villages unless she's hungry. The trick is keeping her fed. Nobody
    wants to figure out what that means in practice."

plot_hooks:
  - id: missing-caravan
    name: The Missing Caravan
    description: |
      A merchant caravan vanished near the Silken Spire three days ago. The village needs the supplies. The silk wrappings visible from the Spire's entrance suggest the Colony has them. Negotiation, stealth, or force — all have costs.
  - id: egg-threat
    name: The Egg Threat
    description: |
      Something — Mist Born, a rival faction, or a PC impulse — threatens to destroy the Queen's egg chambers. She sends the Emissary to the village asking for help protecting her brood. An alliance of necessity that puts players in an impossible position.
  - id: emissary-alone
    name: The Emissary Alone
    description: |
      Players find the Emissary injured and separated from the colony. It won't ask for help directly, but it's dying. What attacked a spider who can call the entire colony for backup at any moment?
  - id: rival-colony
    name: The Rival Colony
    description: |
      A second silk fortress appears on the Path — the Queen didn't authorize it. An Elite Guardian has broken away and is establishing a rival colony. She wants the players to help eliminate it before it grows beyond control.

storylines:
  - id: engine-pact
    name: The Engine Pact
    summary: |
      The Queen wants her Ancient Foundation Engine repaired. She has tasked the players with finding 4 missing components scattered across the Path world. Success permanently stabilizes both the Brood Throne and the Silken Spire and forges a lasting alliance.
    status: active
    phases:
      - id: first-contact
        type: entry
        name: First Contact
        description: |
          Players encounter the Spider Emissary at the Silken Spire entrance. The Emissary assesses them as prey, threat, or something more interesting.
        triggers:
          - Players reach the Silken Spire
        branches:
          - label: Attack the Emissary
            next: hostility
          - label: Listen to the Emissary
            next: audience

      - id: hostility
        type: dead-end
        name: War with the Colony
        description: |
          The Queen does not forgive attacks on her Emissary. The colony becomes actively hostile on all Path encounters — the Brood hunts the players across the underground network.
        branches: []

      - id: audience
        type: milestone
        name: Audience with the Queen
        description: |
          Players descend to the Brood Throne and speak with the Spider Queen directly through silk-vibration translation. She is direct, patient, and unmistakably intelligent.
        branches:
          - label: Accept the Engine Pact
            next: component-hunt
          - label: Threaten the eggs
            next: hostility
          - label: Refuse but negotiate food source only
            next: food-alliance

      - id: food-alliance
        type: branch
        name: Food Alliance
        description: |
          Players agree to direct the colony's hunger toward a specific location or supply route. A cold peace holds. The engine pact remains on the table.
        branches:
          - label: Later accept engine repair
            next: component-hunt
          - label: Food deal only — hold the truce
            next: uneasy-truce

      - id: uneasy-truce
        type: milestone
        name: Uneasy Truce
        description: |
          Players and the Colony maintain cold peace — the colony won't attack them, but offers no further cooperation. The Queen is watching to see if they change their minds.
        branches:
          - label: Accept engine pact
            next: component-hunt

      - id: component-hunt
        type: active
        name: Component Hunt
        description: |
          Players search the Path for 4 missing engine components. Each is housed in a different location, integrated into ancient machinery from the same pre-Mist civilization that built the Foundation Engine.
        progress:
          required: 4
          current: 0
          locations:
            - id: brood-throne
              name: Brood Throne / Silken Spire
              status: available
            - id: geothermal-caverns
              name: Geothermal Caverns
              status: available
            - id: flooded-network
              name: Flooded Network
              status: available
            - id: tbd
              name: TBD
              status: pending
        branches:
          - label: All 4 components gathered
            next: repair-attempt

      - id: repair-attempt
        type: climax
        name: Engine Repair
        description: |
          Players install all components and attempt the final Knowledge roll (Difficulty 15). The Queen watches from her throne without speaking. The silk around the chamber vibrates with something that might be anticipation.
        branches:
          - label: Success
            next: stable-alliance
          - label: Failure
            next: partial-repair

      - id: partial-repair
        type: setback
        name: Partial Repair
        description: |
          The engine partially restores — the Unstable modifier weakens but persists. The Queen is disappointed but acknowledges the attempt. Players may try again with another Knowledge roll after a rest.
        branches:
          - label: Try again
            next: repair-attempt

      - id: stable-alliance
        type: resolution
        name: Permanent Alliance
        description: |
          The Brood Throne and Silken Spire become Stable. The Queen becomes a recurring trade partner with reach across the underground network — intelligence, goods, and early warning of threats moving through her domain. She remembers everyone who helped her.
        branches: []

npcs:
  - id: spider-queen
    file: npcs/spider-queen.yaml
    role: Colony Sovereign
  - id: spider-emissary
    file: npcs/spider-emissary.yaml
    role: Diplomat
adversaries:
  - id: spider-queen
    ref: ../../../adversaries/spider-queen/spider-queen.yaml
  - id: spider-emissary
    ref: ../../../adversaries/spider-queen/spider-emissary.yaml
  - id: giant-spider-guardian
    ref: ../../../adversaries/spider-queen/giant-spider-guardian.yaml
  - id: spider-minion
    ref: ../../../adversaries/spider-queen/spider-minion.yaml
  - id: spider-swarm
    ref: ../../../adversaries/spider-queen/spider-swarm.yaml
