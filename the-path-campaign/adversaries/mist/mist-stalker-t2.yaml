name: Mist Stalker
tier: 2
category: Skulk
description: A more agile and cunning manifestation of the mist's hunger, this creature moves with predatory grace through the otherworldly fog. Its form shifts between solid and ethereal, allowing it to strike from unexpected angles before vanishing back into the mist.
motives: Ambush from mist, strike and fade, hunt light sources, isolate targets
difficulty: 13
thresholds:
  major: 8
  severe: 16
hp: 4
stress: 3
attack:
  bonus: '+3'
  name: Ethereal Claws
  range: Melee
  damage: 2d6+2 phy/mag
experience:
  - name: Heat Sense
    value: 3
  - name: Stealth
    value: 4
features:
  - name: Heat Seekers
    type: Passive
    description: They are the hounds sent out by the mist to seek out flames and extinguish them. Mist Stalkers prioritize fire, light sources, and warm-blooded creatures when selecting targets.
  - name: Mist Step Strike
    type: Action
    cost: Mark a Stress
    description: Have the Stalker move to any point within Far range, ignoring obstacles and enemies by briefly becoming incorporeal. Immediately after moving, make an attack against a target within Melee range.
  - name: Chilling Presence
    type: Reaction
    description: When this adversary makes a successful attack against a PC, you gain a Fear.
lore: These were once scouts, rangers, or rogues who knew the hidden paths before The Path consumed the world. Now their skills serve the mist, using their knowledge of stealth and movement to hunt those who carry the light they once protected.
