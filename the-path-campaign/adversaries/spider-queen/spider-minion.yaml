name: Spider Minion
tier: 2
category: Minion
description: A dog-sized spider with sleek chitin plates and eight gleaming eyes, scuttling across surfaces with unsettling speed. These worker spiders patrol the silk fortress, maintaining webs and hunting for the Queen.
motives: Follow Queen's commands, patrol territory, swarm targets, hunt in packs
difficulty: 13
thresholds: null
hp: 1
stress: 1
attack:
  bonus: '+0'
  name: Venomous Bite
  range: Melee
  damage: 3 phy
experience:
  - name: Climb
    value: 2
features:
  - name: Minion (6)
    type: Passive
    description: The Spider Minion is defeated when they take any damage. For every 6 damage a PC deals to the Minion, defeat an additional Minion within range the attack would succeed against.
  - name: Web Spray
    type: Action
    cost: Spend a Fear
    description: Choose a target and spotlight all Spider Minions within Close range of them. Those Minions move into Melee range of the target and make one shared attack roll. On a success, they deal 3 physical damage each. Combine this damage.
  - name: Ceiling Skitter
    type: Passive
    description: Spider Minions can move freely across walls and ceilings without penalty. When a Spider Minion attacks a target from above (dropping from ceiling or higher position), the Minion has advantage on their attack roll.
lore: These are the worker caste of the Queen's brood, old enough to hunt but still following the colony's commands without question. They maintain the silk structures, carry prey to storage, and patrol endlessly through the woven halls.
