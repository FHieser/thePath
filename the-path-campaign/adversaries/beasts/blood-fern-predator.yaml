name: BLOOD FERN PREDATOR
tier: 2
category: Solo
description: A massive wolf whose fur has been overtaken by spreading crimson moss that grows like living blood, eyes gleaming with predatory intelligence.
motives: Stalk intruders through fern cover, ambush from elevated positions, drag prey into the valley depths, mark territory with killed deer
difficulty: 15
thresholds:
  major: 13
  severe: 25
hp: 9
stress: 4
attack:
  bonus: '+3'
  name: Moss-Slick Bite
  range: Melee
  damage: 2d10+4 physical
experience:
  - name: Valley Hunter
    value: 3
features:
  - name: Relentless (2)
    type: Passive
    description: This adversary can be spotlighted up to two times per GM turn. Spend Fear as usual to spotlight them.
  - name: Fern Stalk
    type: Action
    cost: Mark a Stress
    description: Vanish into the waist-high blood ferns and reposition to any location within Far range that has fern cover. Immediately make a Melee attack with Advantage. The predator melts into the crimson undergrowth, only to explode from the ferns elsewhere.
  - name: Territorial Roar
    type: Action
    uses: 1
    description: All PCs within Far range must make a Presence Reaction Roll (15). Those who fail cannot move closer to the predator until end of their next turn and mark 1 Stress. Its roar echoes through the valley, a primal warning that freezes prey in their tracks.
  - name: Moss-Covered Hide
    type: Passive
    uses: 1
    description: The thick blood moss coating protects the predator. Reduce the severity of all physical damage by one step (Severe becomes Major, Major becomes Minor, minimum of Minor). The first time the predator would take Severe physical damage, apply the reduction (Severe becomes Major), then this ability is lost - the moss armor is shattered and provides no further protection. Blades and arrows sink harmlessly into the dense moss growth - until one devastating blow tears through, shattering the protective layer entirely.
  - name: Valley's Bond
    type: Passive
    description: |
      The predator is the valley's collector, manifestation of ancient pacts. If killed, its body collapses and dissolves into spreading blood moss. The predator is permanently defeated for this session. However, if the party returns to Blood Fern Valley in any future session, the valley reforms its collector from the crimson ferns (full HP, all abilities restored). The debt stones hang as reminder - debts must always be paid, and guardians must always enforce them. You can drive it back, but never truly destroy it. The valley will not forget its collector.
lore: This ancient guardian of Blood Fern Valley is bound to the land itself through mystical pacts. The crimson moss that covers its body is not merely parasitic - it is the valley's living will made manifest, ensuring that debts are collected and intruders are reminded that some places belong to older, hungrier powers.
