name: BFF (BIG FUCKING FROG)
tier: 2
category: Solo
description: An enormous amphibian the size of a wagon, covered in mottled green and brown skin that glistens with toxic slime. Bioluminescent patterns pulse across its warty hide, mesmerizing and deadly.
motives: Lure prey with glowing patterns, dissolve armor with caustic secretions, spray acid at groups, devour intruders
difficulty: 14
thresholds:
  major: 12
  severe: 24
hp: 8
stress: 4
attack:
  bonus: '+3'
  name: Toxic Bite
  range: Melee
  damage: 2d8+6 magic
experience:
  - name: Devour
    value: 2
  - name: Spread Toxins
    value: 2
features:
  - name: Relentless (2)
    type: Passive
    description: This adversary can be spotlighted up to two times per GM turn. Spend Fear as usual to spotlight them.
  - name: Toxic Slime
    type: Passive
    description: When BFF makes a successful attack, the target must mark an Armor Slot without receiving its benefits (they can still use armor to reduce the damage). If they can't mark an Armor Slot, they must mark an additional HP. The frog's toxic secretions corrode metal and leather, eating through protective gear.
  - name: Light Lure
    type: Action
    cost: Spend a Fear
    description: BFF's bioluminescent patterns glow with an enticing light. All targets within Close range must succeed on an Instinct Reaction Roll or be Lured in until they mark 2 Stress or take damage. Targets that are Lured in must move within Melee range of BFF. The hypnotic patterns pulse with otherworldly beauty, drawing victims inexorably closer.
  - name: Acid Spray
    type: Action
    cost: Spend a Fear
    description: Make an attack against all targets in front of BFF within Close range. Targets BFF succeeds against take 2d10+2 magic damage and must mark an Armor Slot without receiving its benefits (they can still use armor to reduce the damage). If they can't mark an Armor Slot, they must mark an additional HP and you gain a Fear. The massive frog expels a spray of caustic digestive fluid, sizzling as it melts through armor and flesh.
  - name: Momentum
    type: Reaction
    description: When BFF makes a successful attack against a PC, you gain a Fear. Each successful strike empowers the beast, making it more dangerous with every moment.
lore: This massive amphibian dominates its territory through a combination of hypnotic beauty and lethal toxicity, using its bioluminescent patterns to lure prey before dissolving their defenses with caustic secretions.
