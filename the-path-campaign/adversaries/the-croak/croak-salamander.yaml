name: Croak Salamander
category: Standard
description: A giant salamander the size of a horse, skin slick and dark, built
  equally for water and platform. The Croak breed and ride them through the swamp
  channels at speed. In combat they are slow to anger but impossible to ignore once
  they are. Their weight shakes the boards when they shift.
motives: Follow the rider's direction, keep moving through water channels, protect
  the mount position, react to threat with mass
lore: The salamanders of The Reeds are bred and tended by the Swimmers in the
  outer island pools. They are not aggressive by nature but will fight when the
  settlement is directly threatened or when their pen is breached. A mounted Croak
  warrior on a salamander covers ground through the swamp channels that no outsider
  can match on foot.

tiers:
  - tier: 2
    difficulty: 14
    thresholds:
      major: 10
      severe: 18
    hp: 5
    stress: 4
    attack:
      bonus: '+2'
      name: Crushing Bite
      range: Melee
      damage: 2d8+2 physical
    experience:
      - name: Amphibious Movement
        value: 3
    features:
      - name: Amphibious
        type: Passive
        description: |
          The salamander moves freely between water channels and wooden platforms
          without movement penalty. When it enters a water channel, any creature
          within Melee range that is not amphibious must make an Agility Reaction
          Roll (Difficulty 14) or be pulled in with it.

      - name: Rideable
        type: Passive
        description: |
          When the salamander is spotlighted, its Croak rider may immediately move
          to any position within Far range as a free action — this does not count
          as their action for the turn. A mounted rider cannot be targeted
          separately from the salamander while it is in motion.

      - name: Regeneration
        type: Passive
        description: |
          When the salamander is spotlighted, it recovers 1 HP.

      - name: Agitated
        type: Reaction
        description: |
          When the salamander takes Severe damage, the mounted rider must make an
          Agility Reaction Roll (Difficulty 14) or be thrown to Very Close range
          and become Prone.
