<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adversaries - The Path</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        #adversary-search-wrapper {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-dark, #0a0a0f);
            padding: 0.75rem 0 0.5rem;
            margin-bottom: 0.5rem;
        }

        #adversary-search {
            width: 100%;
            padding: 0.6rem 1rem;
            background: rgba(255, 255, 255, 0.06);
            border: 0.1rem solid var(--border-color);
            border-radius: 0.2rem;
            color: var(--text-light);
            font-size: 1rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        #adversary-search:focus {
            outline: none;
            border-color: var(--accent-amber);
        }

        #adversary-search::placeholder {
            opacity: 0.4;
        }

        .adversary-group {
            margin-bottom: 1.5rem;
        }

        .group-header {
            color: var(--accent-amber);
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 0.1rem solid var(--border-color);
            padding-bottom: 0.35rem;
            margin: 0 0 0.4rem;
        }

        .adversary-list {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .adversary-row {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            column-gap: 1rem;
            row-gap: 0.1rem;
            padding: 0.5rem 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border: 0.1rem solid var(--border-color);
            border-radius: 0.2rem;
            text-decoration: none;
            color: inherit;
            transition: background 0.12s, border-color 0.12s;
        }

        .adversary-row:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent-amber);
        }

        .adv-name {
            font-weight: 700;
            color: var(--text-light);
            font-size: 0.95rem;
            align-self: center;
        }

        .adv-meta {
            font-size: 0.78rem;
            color: var(--secondary-teal);
            font-weight: 600;
            text-align: right;
            align-self: center;
            white-space: nowrap;
        }

        .adv-desc {
            font-size: 0.82rem;
            opacity: 0.55;
            grid-column: 1 / -1;
            line-height: 1.3;
        }
    </style>
</head>
<body>
    <a class="home-btn" href="index.html">&#8962; Home</a>
    <div class="container">
        <header>
            <h1>Adversaries</h1>
            <p class="subtitle">The Path — Daggerheart Campaign</p>
        </header>

        <main>
            <div class="breadcrumb">
                <a href="index.html">← Back to Campaign</a>
            </div>

            <!-- index-adversaries.js targets this section by its h2 text -->
            <section class="nav-section">
                <h2>Adversaries</h2>
                <div class="nav-cards">
                    <div class="loading">Loading adversaries…</div>
                </div>
            </section>
        </main>

        <footer>
            <p>The Path — Daggerheart Campaign Frame | Built with the Darrington Press Community Gaming License</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="js/content-index.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/index-adversaries.js"></script>
</body>
</html>
